<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading" style="padding:20px">
    <div class="skeleton" style="height:180px;border-radius:var(--radius);margin-bottom:16px"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <!-- Content -->
  <div id="content" style="display:none;padding-bottom:100px">

    <!-- Profile header -->
    <div class="profile-header">
      <div class="avatar avatar-lg" id="profile-avatar">?</div>
      <div class="profile-name" id="profile-name">—</div>
      <div class="profile-university" id="profile-university">—</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center" id="profile-chips"></div>
    </div>

    <!-- Stats -->
    <div class="profile-stats" id="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-rooms">0</div>
        <div class="profile-stat-label">Rooms Posted</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-listings">0</div>
        <div class="profile-stat-label">RM Listings</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-joined">—</div>
        <div class="profile-stat-label">Member Since</div>
      </div>
    </div>

    <!-- Info section -->
    <div style="padding:20px">
      <h3 style="font-family:'Syne',sans-serif;margin-bottom:16px">Contact Info</h3>
      <div class="card">
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">

          <div class="flex-gap">
            <span style="font-size:1.1rem">📧</span>
            <div>
              <div style="font-size:12px;color:var(--muted)">Email</div>
              <div style="font-size:14px" id="info-email">—</div>
            </div>
          </div>

          <div class="flex-gap">
            <span style="font-size:1.1rem">📞</span>
            <div>
              <div style="font-size:12px;color:var(--muted)">Phone</div>
              <div style="font-size:14px" id="info-phone">—</div>
            </div>
          </div>

          <div class="flex-gap" id="info-course-row">
            <span style="font-size:1.1rem">🎓</span>
            <div>
              <div style="font-size:12px;color:var(--muted)">Course</div>
              <div style="font-size:14px" id="info-course">—</div>
            </div>
          </div>

        </div>
      </div>

      <!-- My rooms -->
      <h3 style="font-family:'Syne',sans-serif;margin:24px 0 12px">My Listings</h3>
      <div id="my-rooms-container" style="display:flex;flex-direction:column;gap:12px"></div>
      <div id="my-rooms-empty" style="display:none;color:var(--muted);font-size:14px;text-align:center;padding:20px 0">
        You haven't posted any rooms yet.<br>
        <a href="list-room.html" style="color:var(--accent);font-weight:600">Post your first room →</a>
      </div>

      <!-- Edit profile button -->
      <div style="margin-top:24px">
        <button class="btn btn-secondary" onclick="window.location.href='setup.html'">✏️ Edit Profile</button>
      </div>

      <!-- Logout -->
      <div style="margin-top:12px">
        <button class="btn btn-danger" onclick="handleLogout()">🚪 Log Out</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="roommate.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Roommates
    </a>
    <a href="list-room.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Post
    </a>
    <a href="profile.html" class="nav-item active">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── FIREBASE CONFIG ─────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain: "roomie-f3103.firebaseapp.com",
  projectId: "roomie-f3103",
  storageBucket: "roomie-f3103.firebasestorage.app",
  messagingSenderId: "896474185176",
  appId: "1:896474185176:web:0e4543682f594daf0a86ad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── SAFE AUTH HANDLER (FIXES YOUR ISSUE) ─────────
function waitForAuth() {
  return new Promise(resolve => {
    const unsub = onAuthStateChanged(auth, user => {
      unsub();
      resolve(user);
    });
  });
}

// ─── LOAD PROFILE SAFELY ─────────────────────────
async function loadProfile() {
  const user = await waitForAuth();

  // 🔴 FIX: prevent blank profile page
  if (!user) {
    location.href = "login.html";
    return;
  }

  try {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      // user exists in auth but not firestore
      location.href = "setup.html";
      return;
    }

    const data = snap.data();

    // ─── UPDATE YOUR UI HERE (SAFE) ───
    // Only update fields if they exist in DOM

    if (document.getElementById("profile-name")) {
      document.getElementById("profile-name").textContent =
        data.name || "User";
    }

    if (document.getElementById("profile-email")) {
      document.getElementById("profile-email").textContent =
        data.email || "";
    }

    if (document.getElementById("profile-photo") && data.photoURL) {
      document.getElementById("profile-photo").src = data.photoURL;
    }

  } catch (err) {
    console.error("Profile load error:", err);
    location.href = "login.html";
  }
}

// ─── START ───────────────────────────────────────
loadProfile();

</script>

</body>
</html>
