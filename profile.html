<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading" style="padding:20px">
    <div class="skeleton" style="height:180px;border-radius:var(--radius);margin-bottom:16px"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <!-- Content -->
  <div id="content" style="display:none;padding-bottom:100px">

    <!-- Profile header -->
    <div class="profile-header">
      <div class="avatar avatar-lg" id="profile-avatar">?</div>
      <div class="profile-name" id="profile-name">—</div>
      <div class="profile-university" id="profile-university">—</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center" id="profile-chips"></div>
    </div>

    <!-- Stats -->
    <div class="profile-stats" id="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-rooms">0</div>
        <div class="profile-stat-label">Rooms Posted</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-listings">0</div>
        <div class="profile-stat-label">RM Listings</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num" id="stat-joined">—</div>
        <div class="profile-stat-label">Member Since</div>
      </div>
    </div>

    <!-- Info section -->
    <div style="padding:20px">
      <h3 style="font-family:'Syne',sans-serif;margin-bottom:16px">Contact Info</h3>
      <div class="card">
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
          <div class="flex-gap">
            <span style="font-size:1.1rem">📧</span>
            <div>
              <div style="font-size:12px;color:var(--muted)">Email</div>
              <div style="font-size:14px" id="info-email">—</div>
            </div>
          </div>
          <div class="flex-gap">
            <span style="font-size:1.1rem">📞</span>
            <div>
              <div style="font-size:12px;color:var(--muted)">Phone</div>
              <div style="font-size:14px" id="info-phone">—</div>
            </div>
          </div>
          <div class="flex-gap" id="info-course-row">
            <span style="font-size:1.1rem">🎓</span>
            <div>
              <div style="font-size:12px;color:var(--muted)">Course</div>
              <div style="font-size:14px" id="info-course">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- My rooms -->
      <h3 style="font-family:'Syne',sans-serif;margin:24px 0 12px">My Listings</h3>
      <div id="my-rooms-container" style="display:flex;flex-direction:column;gap:12px"></div>
      <div id="my-rooms-empty" style="display:none;color:var(--muted);font-size:14px;text-align:center;padding:20px 0">
        You haven't posted any rooms yet.<br>
        <a href="list-room.html" style="color:var(--accent);font-weight:600">Post your first room →</a>
      </div>

      <!-- Edit profile button -->
      <div style="margin-top:24px">
        <button class="btn btn-secondary" onclick="window.location.href='setup.html'">✏️ Edit Profile</button>
      </div>

      <!-- Logout -->
      <div style="margin-top:12px">
        <button class="btn btn-danger" onclick="handleLogout()">🚪 Log Out</button>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="nav-item">Home</a>
    <a href="roommate.html" class="nav-item">Roommates</a>
    <a href="list-room.html" class="nav-item">Post</a>
    <a href="profile.html" class="nav-item active">Profile</a>
  </nav>

  <div id="toast" class="toast"></div>

<script type="module">
import { onAuth, getProfile, getUserRooms, saveProfile, logOut } from './firebase.js';
import { uploadImage } from './upload.js';

let currentUser = null;

// ✅ Show UI immediately (no dark loading)
document.getElementById('loading').style.display = 'none';
document.getElementById('content').style.display = 'block';

// 🔐 Auth (non-blocking)
onAuth((user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  currentUser = user;

  loadProfile(user.uid);
  loadRooms(user.uid);
});

// ─────────────────────────────
// PROFILE
async function loadProfile(uid) {
  try {
    const p = await getProfile(uid);
    if (!p) return;

    setAvatar(p.photoURL, p.name);

    document.getElementById('profile-name').textContent = p.name || '—';
    document.getElementById('profile-university').textContent = p.university || '—';

    const chips = document.getElementById('profile-chips');
    chips.innerHTML = '';
    if (p.year) chips.innerHTML += `<span class="badge">🎓 ${p.year}</span>`;
    if (p.course) chips.innerHTML += `<span class="badge">📚 ${p.course}</span>`;

    document.getElementById('info-email').textContent = p.email || '—';
    document.getElementById('info-phone').textContent = p.phone || '—';

    if (p.course) {
      document.getElementById('info-course').textContent = p.course;
    } else {
      document.getElementById('info-course-row').style.display = 'none';
    }

    document.getElementById('stat-joined').textContent = p.createdAt
      ? new Date(p.createdAt).toLocaleDateString('en', { month: 'short', year: 'numeric' })
      : '—';

  } catch (err) {
    console.error('Profile error:', err);
  }
}

// ─────────────────────────────
// ROOMS
async function loadRooms(uid) {
  try {
    const rooms = await getUserRooms(uid) || [];

    document.getElementById('stat-rooms').textContent = rooms.length;

    const container = document.getElementById('my-rooms-container');
    const emptyEl   = document.getElementById('my-rooms-empty');

    if (!rooms.length) {
      emptyEl.style.display = 'block';
      return;
    }

    container.innerHTML = rooms.map(r => `
      <div class="card" onclick="window.location.href='room.html?id=${r.id}'" style="cursor:pointer">
        <div class="card-body" style="display:flex;align-items:center;gap:12px">
          <div style="font-size:1.5rem">🏠</div>
          <div style="flex:1">
            <div style="font-weight:600;font-size:14px">${escHtml(r.title)}</div>
            <div style="font-size:12px;color:var(--muted)">📍 ${escHtml(r.location || '—')}</div>
          </div>
          <span class="card-price">₦${Number(r.price).toLocaleString()}</span>
        </div>
      </div>
    `).join('');

  } catch (err) {
    console.error('Rooms error:', err);
  }
}

// ─────────────────────────────
// AVATAR (PHOTO)

function setAvatar(photoURL, name) {
  const avatar = document.getElementById('profile-avatar');

  if (photoURL) {
    avatar.innerHTML = `
      <img src="${photoURL}"
        style="width:100%;height:100%;border-radius:50%;object-fit:cover"
        onerror="this.outerHTML='${(name||'?')[0].toUpperCase()}'"
      />`;
  } else {
    avatar.textContent = name ? name[0].toUpperCase() : '?';
  }
}

// ─────────────────────────────
// PHOTO UPLOAD (Cloudinary)

window.handlePhotoChange = async function(input) {
  const file = input.files[0];
  if (!file || !currentUser) return;

  try {
    // ⚡ instant preview
    const preview = URL.createObjectURL(file);
    setAvatar(preview, '');

    // Upload to Cloudinary
    const url = await uploadImage(file);

    // Save to Firebase
    await saveProfile(currentUser.uid, {
      photoURL: url
    });

    setAvatar(url, '');

    showToast('Photo updated ✅', 'success');

  } catch (err) {
    console.error(err);
    showToast('Upload failed ❌', 'error');
  }
};

// ─────────────────────────────
// LOGOUT

window.handleLogout = async () => {
  if (!confirm('Are you sure you want to log out?')) return;
  await logOut();
  window.location.href = 'index.html';
};

// ─────────────────────────────
// HELPERS

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
  </script>

</body>
</html>
