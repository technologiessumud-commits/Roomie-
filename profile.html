<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#ff6b35"/>
  <title>Roomie – Profile</title>
  <link rel="stylesheet" href="style.css"/>

  <style>
    .avatar-upload-wrap { position: relative; display: inline-block; cursor: pointer; }
    .avatar-edit-badge {
      position: absolute; bottom: 2px; right: 2px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); display:flex; align-items:center; justify-content:center;
      font-size: 13px;
    }
    .profile-photo {
      width: 88px; height: 88px; border-radius: 50%;
      object-fit: cover;
    }
    .avatar-xl {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-size: 2rem; font-weight: 800; color:#fff;
    }
  </style>
</head>
<body>

<div id="loading" style="padding:20px">Loading profile...</div>

<div id="content" style="display:none">

  <div class="profile-header">
    <div class="avatar-upload-wrap">
      <div id="avatar-container">
        <div class="avatar-xl">?</div>
      </div>
    </div>

    <div id="profile-name">—</div>
    <div id="profile-university">—</div>
    <div id="profile-chips"></div>
  </div>

  <div>
    <div>Rooms: <span id="stat-rooms">0</span></div>
    <div>Saved: <span id="stat-favs">0</span></div>
    <div>Joined: <span id="stat-joined">—</span></div>
  </div>

  <div>
    <h3>Contact</h3>
    <div>Email: <span id="info-email">—</span></div>
    <div>Phone: <span id="info-phone">—</span></div>
    <div id="info-course-row" style="display:none">Course: <span id="info-course"></span></div>
  </div>

  <div>
    <h3>My Rooms</h3>
    <div id="my-rooms-container"></div>
    <div id="my-rooms-empty" style="display:none">No rooms yet</div>
  </div>

  <button onclick="handleLogout()">Logout</button>

</div>

<script type="module">
  import { requireAuth, getProfile, getUserRooms, getFavourites, logOut } from './firebase.js';

  let user;

  try {
    user = await requireAuth();

    const [profile, roomsData, favsData] = await Promise.all([
      getProfile(user.uid),
      getUserRooms(user.uid),
      getFavourites(user.uid)
    ]);

    const rooms = roomsData || [];
    const favs = favsData || [];

    if (!profile) {
      window.location.href = 'setup.html';
    } else {
      renderProfile(profile, rooms, favs);
    }

  } catch (err) {
    console.error(err);
    document.getElementById('loading').innerHTML =
      "Error loading profile. <button onclick='location.reload()'>Retry</button>";
  }

  function renderProfile(p, rooms, favs) {

    setAvatar(p.photoURL, p.name);

    setText('profile-name', p.name || '—');
    setText('profile-university', p.university || '');

    const chips = document.getElementById('profile-chips');
    chips.innerHTML = '';
    if (p.year) chips.innerHTML += `<span>${p.year}</span>`;
    if (p.course) chips.innerHTML += `<span>${p.course}</span>`;

    setText('info-email', p.email || '—');
    setText('info-phone', p.phone || '—');

    if (p.course) {
      setText('info-course', p.course);
      show('info-course-row');
    }

    setText('stat-rooms', rooms.length);
    setText('stat-favs', favs.length);

    setText('stat-joined',
      p.createdAt ? new Date(p.createdAt).toLocaleDateString() : '—'
    );

    const container = document.getElementById('my-rooms-container');
    const empty = document.getElementById('my-rooms-empty');

    if (!rooms.length) {
      empty.style.display = 'block';
    } else {
      container.innerHTML = rooms.map(r =>
        `<div>${r.title} - ₦${r.price}</div>`
      ).join('');
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  }

  function setAvatar(photoURL, name) {
    const el = document.getElementById('avatar-container');
    if (photoURL) {
      el.innerHTML = `<img src="${photoURL}" class="profile-photo"/>`;
    } else {
      el.innerHTML = `<div class="avatar-xl">${(name || '?')[0].toUpperCase()}</div>`;
    }
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function show(id) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'block';
  }

  window.handleLogout = async () => {
    await logOut();
    window.location.href = 'index.html';
  };
</script>

</body>
</html>
