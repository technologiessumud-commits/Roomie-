<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Messages</title>
  <link rel="stylesheet" href="style.css"/>

  <style>
    .chat-item {
      display:flex; align-items:center; gap:14px;
      padding:14px 20px; cursor:pointer;
      border-bottom:1px solid var(--border);
      transition:background .15s;
    }
    .chat-item:hover { background:var(--card); }
    .chat-avatar {
      width:50px; height:50px; border-radius:50%;
      object-fit:cover;
    }
    .chat-avatar-init {
      width:50px; height:50px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-weight:800;
      color:#fff;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Room<span>ie</span></div>
  <div id="msg-count"></div>
</div>

<!-- FIXED STATIC SKELETON -->
<div id="skeleton">
  <div class="chat-item">
    <div class="skeleton" style="width:50px;height:50px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:6px"></div>
      <div class="skeleton" style="height:12px;width:80%"></div>
    </div>
  </div>

  <div class="chat-item">
    <div class="skeleton" style="width:50px;height:50px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:6px"></div>
      <div class="skeleton" style="height:12px;width:80%"></div>
    </div>
  </div>
</div>

<div id="chats-list" style="display:none;padding-bottom:120px"></div>

<div id="empty-state" style="display:none;text-align:center;padding:40px">
  <div style="font-size:2rem">💬</div>
  <div>No messages yet</div>
</div>

<nav class="navbar">
  <a href="home.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7"/></svg>
  </a>
  <a href="roommate.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/></svg>
  </a>
  <a href="list-room.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
  </a>
  <a href="messages.html" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M21 15"/></svg>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/></svg>
  </a>
</nav>

<script type="module">
import { requireAuth, listenUserChats } from './firebase.js';

const user = await requireAuth();

listenUserChats(user.uid, (chats)=>{
  document.getElementById('skeleton').style.display = 'none';

  if(!chats.length){
    document.getElementById('empty-state').style.display='block';
    return;
  }

  document.getElementById('chats-list').style.display='block';

  document.getElementById('chats-list').innerHTML = chats.map(chat=>{
    const theirUid = chat.participants.find(p=>p!==user.uid);
    const name = chat.participantNames?.[theirUid] || 'User';

    return `
      <div class="chat-item"
        onclick="window.location.href='chat.html?uid=${theirUid}&name=${encodeURIComponent(name)}'">
        
        <div class="chat-avatar-init">${name[0].toUpperCase()}</div>

        <div style="flex:1">
          <div style="font-weight:600">${name}</div>
          <div style="font-size:12px;color:var(--muted)">
            ${chat.lastMessage || ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
});
</script>

</body>
</html>
