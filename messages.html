<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Messages</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Room<span>ie</span></div>
  <div style="font-family:'Syne',sans-serif;font-size:13px;color:var(--muted)" id="msg-count"></div>
</div>

<!-- ✅ FIXED STATIC SKELETON -->
<div id="skeleton" style="display:flex;flex-direction:column">
  <div class="chat-item">
    <div class="skeleton" style="width:50px;height:50px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:80%"></div>
    </div>
  </div>
  <div class="chat-item">
    <div class="skeleton" style="width:50px;height:50px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:14px;width:60%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:80%"></div>
    </div>
  </div>
</div>

<div id="chats-list" style="display:none;padding-bottom:120px"></div>

<div id="empty-state" class="empty-state" style="display:none">
  <div class="empty-icon">💬</div>
  <div class="empty-title">No messages yet</div>
  <p class="empty-sub">Message a room owner or roommate to start a conversation.</p>
  <a href="home.html" class="btn btn-primary btn-sm mt-16">Browse Rooms</a>
</div>

<nav class="navbar">
  <a href="home.html" class="nav-item">Home</a>
  <a href="roommate.html" class="nav-item">Roommates</a>
  <a href="list-room.html" class="nav-item">Post</a>
  <a href="messages.html" class="nav-item active">Messages</a>
  <a href="profile.html" class="nav-item">Profile</a>
</nav>

<script type="module">
import { onAuth, listenUserChats } from './firebase.js';

// ✅ non-blocking auth (important)
onAuth((user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  loadChats(user);
});

function loadChats(user) {
  listenUserChats(user.uid, (chats) => {

    document.getElementById('skeleton').style.display = 'none';

    if (!chats || chats.length === 0) {
      document.getElementById('empty-state').style.display = 'flex';
      return;
    }

    document.getElementById('chats-list').style.display = 'block';
    document.getElementById('msg-count').textContent =
      `${chats.length} conversation${chats.length > 1 ? 's' : ''}`;

    document.getElementById('chats-list').innerHTML = chats.map(chat => {
      const theirUid  = chat.participants.find(p => p !== user.uid);
      const theirName = chat.participantNames?.[theirUid] || 'Unknown';
      const theirPhoto= chat.participantPhotos?.[theirUid] || '';
      const theirUni  = chat.participantUnis?.[theirUid] || '';
      const initial   = theirName[0]?.toUpperCase() || '?';
      const lastMsg   = chat.lastMessage || 'No messages yet';

      const time = chat.lastMessageTime?.seconds
        ? formatTime(new Date(chat.lastMessageTime.seconds * 1000))
        : '';

      const avatar = theirPhoto
        ? `<img src="${theirPhoto}" class="chat-avatar"
            onerror="this.outerHTML='<div class=chat-avatar-init>${initial}</div>'"/>`
        : `<div class="chat-avatar-init">${initial}</div>`;

      return `
        <div class="chat-item" onclick="location.href='chat.html?uid=${theirUid}&name=${encodeURIComponent(theirName)}'">
          <div style="position:relative">${avatar}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between">
              <span style="font-weight:700;font-size:15px">${escHtml(theirName)}</span>
              <span style="font-size:11px;color:var(--muted)">${time}</span>
            </div>
            <div style="font-size:12px;color:var(--muted)">${escHtml(theirUni)}</div>
            <div style="font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${escHtml(lastMsg)}
            </div>
          </div>
        </div>
      `;
    }).join('');
  });
}

function formatTime(date) {
  const now = new Date();
  const diffH = (now - date) / 36e5;

  if (diffH < 24)
    return date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  if (diffH < 168)
    return date.toLocaleDateString([], { weekday:'short' });

  return date.toLocaleDateString([], { day:'numeric', month:'short' });
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>

</body>
</html>
