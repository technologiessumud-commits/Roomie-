<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Messages</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .chat-item {
      display:flex; align-items:center; gap:14px;
      padding:14px 20px; cursor:pointer;
      border-bottom:1px solid var(--border);
    }
    .chat-avatar {
      width:50px; height:50px; border-radius:50%;
      object-fit:cover;
    }
    .chat-avatar-init {
      width:50px; height:50px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-weight:800; color:#fff;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Room<span>ie</span></div>
  <div id="msg-count"></div>
</div>

<!-- ✅ FIXED (no JS inside HTML) -->
<div id="skeleton">
  <div class="chat-item">
    <div class="skeleton" style="width:50px;height:50px;border-radius:50%"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:14px;width:60%"></div>
    </div>
  </div>
</div>

<div id="chats-list" style="display:none;padding-bottom:120px"></div>

<div id="empty-state" style="display:none">
  <div>💬</div>
  <div>No messages yet</div>
</div>

<nav class="navbar">
  <a href="home.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7"/></svg>
    Home
  </a>
  <a href="roommate.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/></svg>
    Roommates
  </a>
  <a href="list-room.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
    Post
  </a>
  <a href="messages.html" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M21 15"/></svg>
    Messages
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
</nav>

<script type="module">
import { onAuth, listenUserChats } from './firebase.js';

// ✅ non-blocking auth
onAuth((user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  listenUserChats(user.uid, (chats) => {

    document.getElementById('skeleton').style.display = 'none';

    if (!chats.length) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    document.getElementById('chats-list').style.display = 'block';
    document.getElementById('msg-count').textContent =
      chats.length + ' chats';

    document.getElementById('chats-list').innerHTML = chats.map(chat => {

      const theirUid = chat.participants.find(p => p !== user.uid);
      const name = chat.participantNames?.[theirUid] || 'User';
      const photo = chat.participantPhotos?.[theirUid];

      const avatar = photo
        ? `<img src="${photo}" class="chat-avatar"/>`
        : `<div class="chat-avatar-init">${name[0]}</div>`;

      return `
        <div class="chat-item" onclick="location.href='chat.html?uid=${theirUid}'">
          ${avatar}
          <div>${name}</div>
        </div>
      `;
    }).join('');
  });
});
</script>

</body>
</html>
