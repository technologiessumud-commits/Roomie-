<!DOCTYPE html>
<html>
<head>
  <title>Roomie</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f4f8;
      margin: 20px;
    }

    h1 {
      text-align: center;
    }

    .nav {
      text-align: center;
      margin-bottom: 20px;
    }

    .nav a {
      margin: 0 10px;
      color: #1d4ed8;
      text-decoration: none;
    }

    .filter {
      text-align: center;
      margin-bottom: 20px;
    }

    .rooms {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .price {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Roomie</h1>

  <div class="nav">
    <a href="signup.html">Signup</a> |
    <a href="login.html">Login</a> |
    <a href="list-room.html">List a Room</a>
  </div>

  <div class="filter">
    <select id="filterLocation" onchange="loadRooms()">
      <option value="">All Locations</option>
      <option value="Campus A">Campus A</option>
      <option value="Campus B">Campus B</option>
      <option value="Campus C">Campus C</option>
    </select>
  </div>

  <div class="rooms" id="roomsContainer"></div>

  <script type="module">
    import { db, collection, getDocs } from "./firebase.js";

    const container = document.getElementById("roomsContainer");

    async function loadRooms() {
      const filter = document.getElementById("filterLocation").value;
      const snapshot = await getDocs(collection(db, "rooms"));

      container.innerHTML = "";

      snapshot.forEach((doc) => {
        const room = doc.data();

        if (filter && room.location !== filter) return;

        const div = document.createElement("div");
        div.classList.add("card");

        div.innerHTML = `
          <h3>${room.title}</h3>
          <p>${room.description}</p>
          <p><strong>${room.location}</strong></p>
          <p class="price">₦${room.price}</p>
          <p style="font-size:12px;">${room.ownerEmail}</p>
        `;

        container.appendChild(div);
      });
    }

    loadRooms();
  </script>

</body>
</html>
