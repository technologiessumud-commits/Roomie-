<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Saved Rooms</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div style="font-family:'Syne',sans-serif;font-weight:700">Saved Rooms ❤️</div>
  <div style="width:40px"></div>
</div>

<div id="skeleton-loader" style="padding:20px;display:flex;flex-direction:column;gap:16px">
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
</div>

<div id="rooms-container" class="rooms-grid" style="display:none;padding:16px 20px;padding-bottom:100px"></div>

<div id="empty-state" class="empty-state" style="display:none">
  <div class="empty-icon">❤️</div>
  <div class="empty-title">No saved rooms yet</div>
  <p class="empty-sub">Tap the 🤍 on any room to save it here.</p>
  <a href="home.html" class="btn btn-primary btn-sm mt-16">Browse Rooms</a>
</div>

<nav class="navbar">
  <a href="home.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </a>
  <a href="roommate.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Roommates
  </a>
  <a href="list-room.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Post
  </a>
  <a href="favourites.html" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Saved
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<div id="toast" class="toast"></div>

<script type="module">
  import { requireAuth, getFavourites, getRoom, toggleFavourite } from './firebase.js';

  const user = await requireAuth();
  const favIds = await getFavourites(user.uid);

  document.getElementById('skeleton-loader').style.display = 'none';

  if (!favIds.length) {
    document.getElementById('empty-state').style.display = 'flex';
  } else {
    const rooms = (await Promise.all(favIds.map(id => getRoom(id)))).filter(Boolean);
    const container = document.getElementById('rooms-container');
    container.style.display = 'flex';

    container.innerHTML = rooms.map(room => {
      const img = room.imageURLs?.length
        ? `<img class="card-img" src="${room.imageURLs[0]}" alt="${room.title}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>📷</div>'"/>`
        : `<div class="card-img-placeholder">📷 No image</div>`;
      const isOccupied = room.status === 'occupied';
      return `
        <div class="card" onclick="window.location.href='room.html?id=${room.id}'" style="cursor:pointer;${isOccupied?'opacity:.7':''}">
          ${img}
          <div class="card-body">
            ${isOccupied ? '<span class="card-tag need" style="margin-bottom:8px;display:inline-block">🔒 Occupied</span>' : ''}
            <div class="card-title">${escHtml(room.title)}</div>
            <div class="card-meta">📍 ${escHtml(room.location||'—')}</div>
            <div class="card-meta">🎓 ${escHtml(room.ownerUniversity||'—')}</div>
            <div class="flex-between" style="margin-top:8px">
              <span class="card-price">₦${Number(room.price).toLocaleString()}<span style="font-size:12px;font-weight:400;color:var(--muted)">/mo</span></span>
              <button onclick="event.stopPropagation();removeFav('${room.id}',this)" style="background:none;border:none;color:var(--danger);font-size:1.2rem;cursor:pointer">❤️</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  window.removeFav = async (roomId, btn) => {
    await toggleFavourite(user.uid, roomId);
    btn.closest('.card').remove();
    const remaining = document.querySelectorAll('#rooms-container .card').length;
    if (!remaining) {
      document.getElementById('rooms-container').style.display = 'none';
      document.getElementById('empty-state').style.display = 'flex';
    }
    showToast('Removed from saved rooms');
  };

  function escHtml(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
  function showToast(msg,type=''){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className=`toast ${type} show`;
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
</body>
</html>
