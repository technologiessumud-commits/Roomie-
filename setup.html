<script type="module">
  import { auth, saveProfile, onAuth } from './firebase.js';
  import { uploadImage } from './upload.js';

  onAuth((user) => { if (!user) window.location.href = 'login.html'; });

  const COUNTRIES = [
    "Afghanistan","Albania","Algeria","Angola","Argentina","Armenia","Australia",
    "Austria","Azerbaijan","Bahrain","Bangladesh","Belarus","Belgium","Benin",
    "Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Bulgaria","Burkina Faso",
    "Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic",
    "Chad","Chile","China","Colombia","Congo","Costa Rica","Croatia","Cuba","Cyprus",
    "Czech Republic","Denmark","Djibouti","Dominican Republic","DR Congo","Ecuador",
    "Egypt","El Salvador","Eritrea","Estonia","Eswatini","Ethiopia","Finland","France",
    "Gabon","Gambia","Georgia","Germany","Ghana","Greece","Guatemala","Guinea",
    "Guinea-Bissau","Haiti","Honduras","Hungary","India","Indonesia","Iran","Iraq",
    "Ireland","Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya",
    "Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya",
    "Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Mali","Malta",
    "Mauritania","Mauritius","Mexico","Moldova","Mongolia","Morocco","Mozambique",
    "Myanmar","Namibia","Nepal","Netherlands","New Zealand","Nicaragua","Niger",
    "Nigeria","North Korea","Norway","Oman","Pakistan","Palestine","Panama",
    "Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar",
    "Romania","Russia","Rwanda","Saudi Arabia","Senegal","Sierra Leone","Singapore",
    "Slovakia","Slovenia","Somalia","South Africa","South Korea","South Sudan","Spain",
    "Sri Lanka","Sudan","Sweden","Switzerland","Syria","Taiwan","Tajikistan",
    "Tanzania","Thailand","Togo","Trinidad and Tobago","Tunisia","Turkey",
    "Turkmenistan","Uganda","Ukraine","United Arab Emirates","United Kingdom",
    "United States","Uruguay","Uzbekistan","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
  ];

  const UNIVERSITIES = {
    Nigeria: ["University of Lagos","University of Ibadan","Covenant University","Other (type below)"],
    Ghana: ["University of Ghana","KNUST","Other (type below)"],
    Kenya: ["University of Nairobi","Other (type below)"],
    South Africa: ["University of Cape Town","Other (type below)"],
    United Kingdom: ["University of Oxford","Other (type below)"],
    United States: ["Harvard University","Other (type below)"],
    Canada: ["University of Toronto","Other (type below)"]
  };

  const countryEl = document.getElementById('country');

  COUNTRIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.toLowerCase();
    opt.textContent = c;
    countryEl.appendChild(opt);
  });

  window.onCountryChange = function () {
    const country = countryEl.options[countryEl.selectedIndex].text;
    const uniGroup  = document.getElementById('uni-group');
    const uniSelect = document.getElementById('uni-select');
    const uniOther  = document.getElementById('uni-other');

    uniSelect.innerHTML = '<option value="">— Select your university —</option>';
    uniOther.style.display = 'none';
    uniOther.value = '';

    if (!country || country.startsWith('—')) {
      uniGroup.style.display = 'none';
      return;
    }

    uniGroup.style.display = 'block';

    const unis = UNIVERSITIES[country];

    if (unis) {
      uniSelect.style.display = 'block';

      unis.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u;
        opt.textContent = u;
        uniSelect.appendChild(opt);
      });

      uniSelect.onchange = () => {
        uniOther.style.display =
          uniSelect.value === 'Other (type below)' ? 'block' : 'none';
      };
    } else {
      uniSelect.style.display = 'none';
      uniOther.style.display = 'block';
    }
  };

  window.handlePhotoSelect = async function (input) {
    const file = input.files[0];
    if (!file) return;

    const statusEl = document.getElementById('photo-status');
    const preview  = document.getElementById('photo-preview');

    statusEl.textContent = 'Uploading…';

    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML =
        `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover" />`;
    };
    reader.readAsDataURL(file);

    try {
      const url = await uploadImage(file);
      document.getElementById('photoURL').value = url;
      statusEl.textContent = '✅ Photo uploaded!';
    } catch (err) {
      statusEl.textContent = 'Upload failed';
    }
  };

  window.handleSave = async function () {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const city = document.getElementById('city').value.trim();
    const photoURL = document.getElementById('photoURL').value.trim();
    const course = document.getElementById('course').value.trim();
    const year = document.getElementById('year').value;

    const countryOpt = countryEl.options[countryEl.selectedIndex];
    const country = countryOpt?.text || '';
    const countryVal = countryOpt?.value || '';

    const uniSelect = document.getElementById('uni-select');
    const uniOther = document.getElementById('uni-other');

    const university =
      uniSelect.value && uniSelect.value !== 'Other (type below)'
        ? uniSelect.value
        : uniOther.value.trim();

    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('save-btn');

    errEl.style.display = 'none';

    if (!name || !phone || !country || !university || !city) {
      errEl.textContent = 'Please fill all required fields';
      errEl.style.display = 'block';
      return;
    }

    const user = auth.currentUser;
    if (!user) return (window.location.href = 'login.html');

    btn.textContent = 'Saving…';
    btn.disabled = true;

    try {
      await saveProfile(user.uid, {
        uid: user.uid,
        email: user.email,
        name,
        phone,
        university,
        country: countryVal,
        countryDisplay: country,
        city,
        photoURL,
        course,
        year,
        createdAt: Date.now()
      });

      btn.textContent = 'Saved! Redirecting…';

      setTimeout(() => {
        window.location.href = 'home.html';
      }, 900);

    } catch (err) {
      errEl.textContent = 'Failed to save profile';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Save & Continue';
    }
  };
</script>
