<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Set Up Profile</title>
  <link rel="stylesheet" href="style.css"/>

  <style>
    .select-wrap { position:relative; }

    .select-wrap select {
      appearance:none;
      -webkit-appearance:none;
      padding-right:40px;
      cursor:pointer;
      position:relative;
      z-index:2; /* ✅ FIXED CLICK ISSUE */
    }

    .select-wrap::after {
      content:'';
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      border:5px solid transparent;
      border-top-color:var(--muted);
      margin-top:3px;
      pointer-events:none;
      z-index:1;
    }

    .photo-preview-circle {
      width:72px; height:72px; border-radius:50%;
      background:var(--card); border:2px dashed var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; overflow:hidden; flex-shrink:0; cursor:pointer;
    }

    .photo-preview-circle img {
      width:100%; height:100%; object-fit:cover;
    }
  </style>
</head>

<body>
<div class="page-full">
  <div style="max-width:480px;margin:0 auto;width:100%;padding-bottom:40px">

    <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:4px">One last step 🎉</div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:28px">Set up your profile so others can get to know you.</p>

    <!-- PHOTO -->
    <div class="form-group">
      <label>Profile photo <span style="color:var(--muted)">(optional)</span></label>
      <div style="display:flex;align-items:center;gap:14px">
        <div class="photo-preview-circle" id="photo-circle" onclick="document.getElementById('photo-file').click()">👤</div>
        <div>
          <label for="photo-file" style="display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 16px;cursor:pointer;font-size:14px;font-weight:500;margin-bottom:0">
            📷 Choose photo
          </label>
          <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhotoSelect(this)"/>
          <p class="form-hint" id="photo-status" style="margin-top:6px">Tap to upload a profile picture</p>
        </div>
      </div>
      <input type="hidden" id="photoURL"/>
    </div>

    <div class="form-group">
      <label>Full name *</label>
      <input type="text" id="name" placeholder="e.g. Emeka Johnson"/>
    </div>

    <div class="form-group">
      <label>Phone number *</label>
      <input type="tel" id="phone" placeholder="+234 800 000 0000"/>
    </div>

    <!-- COUNTRY -->
    <div class="form-group">
      <label>Country *</label>
      <div class="select-wrap">
        <select id="country" onchange="onCountryChange()">
          <option value="">— Select your country —</option>
        </select>
      </div>
    </div>

    <!-- UNIVERSITY -->
    <div class="form-group" id="uni-group" style="display:none">
      <label>University *</label>
      <div class="select-wrap" id="uni-select-wrap">
        <select id="uni-select" onchange="onUniChange()">
          <option value="">— Select your university —</option>
        </select>
      </div>
      <input type="text" id="uni-other" placeholder="Type your university name…" style="display:none;margin-top:8px"/>
    </div>

    <div class="form-group">
      <label>City / State *</label>
      <input type="text" id="city" placeholder="e.g. Lagos"/>
    </div>

    <div class="form-group">
      <label>Course / Department</label>
      <input type="text" id="course"/>
    </div>

    <div class="form-group">
      <label>Year of study</label>
      <div class="select-wrap">
        <select id="year">
          <option value="">Select year</option>
          <option>1st year</option><option>2nd year</option>
          <option>3rd year</option><option>4th year</option>
          <option>Postgraduate</option>
        </select>
      </div>
    </div>

    <p id="error-msg" style="display:none;color:red"></p>

    <button class="btn btn-primary" onclick="handleSave()">Save & Continue</button>

    <!-- HOME BUTTON -->
    <button class="btn" style="margin-top:12px" onclick="goHome()">⬅ Go to Home</button>

  </div>
</div>

<script type="module">
import { auth, saveProfile, onAuth } from './firebase.js';
import { uploadImage } from './upload.js';

onAuth(u => { if (!u) window.location.href = 'login.html'; });

// COUNTRIES
const COUNTRIES = ["Nigeria","Ghana","Kenya","United States","United Kingdom","Canada","India","Germany","France","Australia"];

// UNIVERSITIES
const UNIVERSITIES = {
"Nigeria": ["University of Lagos","University of Ibadan","OAU","UNN","UNILORIN","LASU","Covenant University","Babcock University","Other (type below)"]
};

// populate countries
const countryEl = document.getElementById('country');
COUNTRIES.forEach(c=>{
  let o=document.createElement('option');
  o.value=c;
  o.textContent=c;
  countryEl.appendChild(o);
});

// country change
window.onCountryChange=function(){
  let c=countryEl.value;
  let group=document.getElementById('uni-group');
  let select=document.getElementById('uni-select');
  let other=document.getElementById('uni-other');

  select.innerHTML='<option value="">Select university</option>';
  other.style.display='none';

  if(!c){group.style.display='none';return;}

  group.style.display='block';

  if(c==="Nigeria"){
    UNIVERSITIES["Nigeria"].forEach(u=>{
      let o=document.createElement('option');
      o.textContent=u;
      select.appendChild(o);
    });
    select.style.display='block';
  } else {
    select.style.display='none';
    other.style.display='block';
  }
};

// image preview
window.handlePhotoSelect = async function(input){
  const file=input.files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('photo-circle').innerHTML=`<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);

  try{
    const url=await uploadImage(file);
    document.getElementById('photoURL').value=url;
  }catch{}
};

// save
window.handleSave=async()=>{
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();

  if(!name||!phone){
    document.getElementById('error-msg').innerText="Fill required fields";
    return;
  }

  await saveProfile({name,phone});
};

// home
window.goHome=()=>window.location.href="index.html";
</script>

</body>
</html>
