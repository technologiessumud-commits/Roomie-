<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Set Up Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-full">
    <div style="max-width:480px;margin:0 auto;width:100%">

      <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:4px">
        One last step 🎉
      </div>
      <p style="color:var(--muted);font-size:14px;margin-bottom:32px">
        Set up your profile so others can get to know you.
      </p>

      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="name" placeholder="e.g. Emeka Johnson" />
      </div>
      <div class="form-group">
        <label>Phone number</label>
        <input type="tel" id="phone" placeholder="+234 800 000 0000" />
      </div>
      <div class="form-group">
        <label>University / College</label>
        <input type="text" id="university" placeholder="e.g. University of Lagos" oninput="suggestUniversity(this.value)" />
        <div id="uni-suggestions" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:4px;display:none;max-height:180px;overflow-y:auto;z-index:10;position:relative"></div>
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" id="country" placeholder="e.g. Nigeria" />
        <p class="form-hint">Used to show you rooms & roommates from your country.</p>
      </div>
      <div class="form-group">
        <label>City / State</label>
        <input type="text" id="city" placeholder="e.g. Lagos" />
      </div>
      <div class="form-group">
        <label>Profile photo URL <span style="color:var(--muted)">(optional)</span></label>
        <input type="url" id="photoURL" placeholder="https://i.imgur.com/yourphoto.jpg" />
        <p class="form-hint">Paste a direct image link. Shows on your profile and roommate card.</p>
      </div>
      <div class="form-group">
        <label>Course / Department <span style="color:var(--muted)">(optional)</span></label>
        <input type="text" id="course" placeholder="e.g. Computer Science" />
      </div>
      <div class="form-group">
        <label>Year of study <span style="color:var(--muted)">(optional)</span></label>
        <select id="year">
          <option value="">Select year</option>
          <option>1st year</option>
          <option>2nd year</option>
          <option>3rd year</option>
          <option>4th year</option>
          <option>Postgraduate</option>
        </select>
      </div>

      <p id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px"></p>

      <button class="btn btn-primary" id="save-btn" onclick="handleSave()">
        Save &amp; Continue
      </button>
    </div>
  </div>

  <script type="module">
    import { auth, saveProfile, onAuth } from './firebase.js';

    onAuth((user) => { if (!user) window.location.href = 'login.html'; });

    // Basic university suggestions (Nigerian universities as default)
    const universities = [
      'University of Lagos','University of Ibadan','Obafemi Awolowo University',
      'University of Nigeria Nsukka','Ahmadu Bello University','University of Benin',
      'Lagos State University','Covenant University','Babcock University',
      'Pan-Atlantic University','Redeemer\'s University','Landmark University',
      'University of Abuja','Federal University of Technology Minna',
      'Nnamdi Azikiwe University','University of Port Harcourt',
      'Harvard University','MIT','Stanford University','Oxford University',
      'Cambridge University','Yale University','Princeton University',
    ];

    window.suggestUniversity = function(val) {
      const box = document.getElementById('uni-suggestions');
      if (!val || val.length < 2) { box.style.display = 'none'; return; }
      const matches = universities.filter(u => u.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
      if (matches.length === 0) { box.style.display = 'none'; return; }
      box.style.display = 'block';
      box.innerHTML = matches.map(u =>
        `<div onclick="selectUni('${u.replace(/'/g,"\\'")}')}" style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background=''">${u}</div>`
      ).join('');
    };

    window.selectUni = function(name) {
      document.getElementById('university').value = name;
      document.getElementById('uni-suggestions').style.display = 'none';
    };

    window.handleSave = async () => {
      const name     = document.getElementById('name').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const university = document.getElementById('university').value.trim();
      const country  = document.getElementById('country').value.trim();
      const city     = document.getElementById('city').value.trim();
      const photoURL = document.getElementById('photoURL').value.trim();
      const course   = document.getElementById('course').value.trim();
      const year     = document.getElementById('year').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('save-btn');

      errEl.style.display = 'none';

      if (!name || !phone || !university || !country || !city) {
        errEl.textContent = 'Please fill in name, phone, university, country and city.';
        errEl.style.display = 'block'; return;
      }

      const user = auth.currentUser;
      if (!user) { window.location.href = 'login.html'; return; }

      btn.textContent = 'Saving…';
      btn.disabled = true;

      try {
        await saveProfile(user.uid, {
          uid: user.uid, email: user.email,
          name, phone, university,
          country: country.toLowerCase().trim(),
          city: city.toLowerCase().trim(),
          photoURL, course, year,
          createdAt: new Date().toISOString()
        });
        window.location.href = 'home.html';
      } catch (err) {
        errEl.textContent = 'Error saving profile. Try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Save & Continue';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
