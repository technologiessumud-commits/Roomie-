<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Set Up Profile</title>
  <link rel="stylesheet" href="style.css"/>

  <style>
    .select-wrap { position:relative; }

    .select-wrap select {
      appearance:none;
      -webkit-appearance:none;
      padding-right:40px;
      cursor:pointer;
      position:relative;
      z-index:2;
    }

    .select-wrap::after {
      content:'';
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      border:5px solid transparent;
      border-top-color:var(--muted);
      pointer-events:none;
      z-index:1;
    }

    .photo-preview-circle {
      width:72px;
      height:72px;
      border-radius:50%;
      background:var(--card);
      border:2px dashed var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.8rem;
      overflow:hidden;
      cursor:pointer;
    }

    .photo-preview-circle img {
      width:100%;
      height:100%;
      object-fit:cover;
    }
  </style>
</head>

<body>
<div class="page-full">
  <div style="max-width:480px;margin:0 auto;width:100%;padding-bottom:40px">

    <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:4px">
      One last step 🎉
    </div>

    <p style="color:var(--muted);font-size:14px;margin-bottom:28px">
      Set up your profile so others can get to know you.
    </p>

    <!-- PROFILE PHOTO -->
    <div class="form-group">
      <label>Profile photo <span style="color:var(--muted)">(optional)</span></label>

      <div style="display:flex;align-items:center;gap:14px">
        <div class="photo-preview-circle" id="photo-circle"
          onclick="document.getElementById('photo-file').click()">👤</div>

        <div>
          <label for="photo-file"
            style="display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);padding:9px 16px;border-radius:8px;cursor:pointer">
            📷 Choose photo
          </label>

          <input type="file" id="photo-file" accept="image/*"
            style="display:none" onchange="handlePhotoSelect(this)"/>

          <p id="photo-status" style="margin-top:6px;color:var(--muted);font-size:13px">
            Tap to upload profile picture
          </p>
        </div>
      </div>

      <input type="hidden" id="photoURL"/>
    </div>

    <!-- NAME -->
    <div class="form-group">
      <label>Full name *</label>
      <input type="text" id="name" placeholder="e.g. Emeka Johnson"/>
    </div>

    <!-- PHONE -->
    <div class="form-group">
      <label>Phone number *</label>
      <input type="tel" id="phone" placeholder="+234 800 000 0000"/>
    </div>

    <!-- COUNTRY -->
    <div class="form-group">
      <label>Country *</label>
      <div class="select-wrap">
        <select id="country" onchange="onCountryChange()">
          <option value="">— Select your country —</option>
        </select>
      </div>
    </div>

    <!-- UNIVERSITY -->
    <div class="form-group" id="uni-group" style="display:none">
      <label>University *</label>

      <div class="select-wrap" id="uni-select-wrap">
        <select id="uni-select" onchange="onUniChange()"></select>
      </div>

      <input type="text" id="uni-other"
        placeholder="Type your university…" style="display:none;margin-top:8px"/>
    </div>

    <!-- CITY -->
    <div class="form-group">
      <label>City / State *</label>
      <input type="text" id="city" placeholder="e.g. Lagos"/>
    </div>

    <!-- COURSE -->
    <div class="form-group">
      <label>Course / Department</label>
      <input type="text" id="course"/>
    </div>

    <!-- YEAR -->
    <div class="form-group">
      <label>Year of study</label>
      <div class="select-wrap">
        <select id="year">
          <option value="">Select year</option>
          <option>1st year</option>
          <option>2nd year</option>
          <option>3rd year</option>
          <option>4th year</option>
          <option>Postgraduate</option>
        </select>
      </div>
    </div>

    <p id="error-msg" style="display:none;color:red;font-size:13px"></p>

    <button class="btn btn-primary" onclick="handleSave()">
      Save & Continue
    </button>

    <button class="btn" style="margin-top:10px" onclick="goHome()">
      ⬅ Go Home
    </button>

  </div>
</div>

<script type="module">
import { saveProfile } from './firebase.js';
import { uploadImage } from './upload.js';

/* =========================
   COUNTRIES
========================= */
const COUNTRIES = [
"Afghanistan","Albania","Algeria","Angola","Argentina","Armenia","Australia","Austria",
"Azerbaijan","Bahrain","Bangladesh","Belarus","Belgium","Benin","Bolivia","Botswana",
"Brazil","Bulgaria","Burkina Faso","Burundi","Cambodia","Cameroon","Canada","Cape Verde",
"Central African Republic","Chad","Chile","China","Colombia","Congo","Costa Rica",
"Croatia","Cuba","Cyprus","Czech Republic","Denmark","Djibouti","Dominican Republic",
"DR Congo","Ecuador","Egypt","El Salvador","Eritrea","Estonia","Eswatini","Ethiopia",
"Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Guatemala",
"Guinea","Haiti","Honduras","Hungary","India","Indonesia","Iran","Iraq","Ireland",
"Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kuwait","Laos",
"Latvia","Lebanon","Lesotho","Liberia","Libya","Lithuania","Luxembourg","Madagascar",
"Malawi","Malaysia","Mali","Malta","Mauritania","Mauritius","Mexico","Moldova",
"Mongolia","Morocco","Mozambique","Myanmar","Namibia","Nepal","Netherlands",
"New Zealand","Nicaragua","Niger","Nigeria","Norway","Pakistan","Portugal","Qatar",
"Romania","Russia","Rwanda","Saudi Arabia","Senegal","South Africa","South Korea",
"Spain","Sri Lanka","Sudan","Sweden","Switzerland","Tanzania","Thailand","Togo",
"Turkey","Uganda","Ukraine","United Kingdom","United States","Zambia","Zimbabwe"
];

/* =========================
   UNIVERSITIES (NIGERIA FULL)
========================= */
const UNIVERSITIES = {
"Nigeria": [
"University of Lagos (UNILAG)",
"University of Ibadan (UI)",
"Obafemi Awolowo University (OAU)",
"Ahmadu Bello University (ABU)",
"University of Nigeria Nsukka (UNN)",
"University of Benin (UNIBEN)",
"Lagos State University (LASU)",
"Covenant University",
"Babcock University",
"Federal University of Technology Akure (FUTA)",
"Federal University of Technology Owerri (FUTO)",
"University of Ilorin (UNILORIN)",
"University of Port Harcourt (UNIPORT)",
"Other (type below)"
]
};

/* =========================
   INIT COUNTRIES
========================= */
const countryEl = document.getElementById('country');

COUNTRIES.forEach(c=>{
  const opt=document.createElement('option');
  opt.value=c;
  opt.textContent=c;
  countryEl.appendChild(opt);
});

/* =========================
   COUNTRY CHANGE
========================= */
window.onCountryChange=function(){
  const country = countryEl.value;
  const group   = document.getElementById('uni-group');
  const select  = document.getElementById('uni-select');
  const other   = document.getElementById('uni-other');

  select.innerHTML='';
  other.style.display='none';

  if(!country){
    group.style.display='none';
    return;
  }

  group.style.display='block';

  if(UNIVERSITIES[country]){
    UNIVERSITIES[country].forEach(u=>{
      const o=document.createElement('option');
      o.value=u;
      o.textContent=u;
      select.appendChild(o);
    });
    select.style.display='block';
  } else {
    select.style.display='none';
    other.style.display='block';
  }
};

/* =========================
   UNIVERSITY CHANGE
========================= */
window.onUniChange=function(){
  const other=document.getElementById('uni-other');
  const val=document.getElementById('uni-select').value;
  other.style.display = val==="Other (type below)" ? 'block' : 'none';
};

/* =========================
   PHOTO UPLOAD
========================= */
window.handlePhotoSelect = async function(input){
  const file=input.files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('photo-circle').innerHTML=
      `<img src="${e.target.result}">`;
  };
  reader.readAsDataURL(file);

  try{
    const url=await uploadImage(file);
    document.getElementById('photoURL').value=url;
  }catch(e){
    console.log(e);
  }
};

/* =========================
   SAVE PROFILE + REDIRECT
========================= */
window.handleSave = async function(){

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const country = document.getElementById('country').value;
  const city = document.getElementById('city').value.trim();
  const photoURL = document.getElementById('photoURL').value;

  const uniSelect = document.getElementById('uni-select');
  const uniOther = document.getElementById('uni-other');

  let university =
    uniSelect.style.display !== 'none'
      ? uniSelect.value
      : uniOther.value.trim();

  if(!name || !phone || !country || !city){
    document.getElementById('error-msg').style.display='block';
    document.getElementById('error-msg').textContent='Please fill all required fields';
    return;
  }

  await saveProfile({
    name,
    phone,
    country,
    university,
    city,
    photoURL
  });

  // ✅ SMART REDIRECT
  const isEdit = document.referrer.includes("profile.html");

  if(isEdit){
    window.location.href="profile.html";
  } else {
    window.location.href="home.html";
  }
};

/* =========================
   HOME BUTTON
========================= */
window.goHome=function(){
  window.location.href="home.html";
};
</script>

</body>
</html>
