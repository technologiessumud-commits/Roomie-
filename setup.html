<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Roomie – Set Up Profile</title>

<style>
.select-wrap { position:relative; }
.select-wrap select { appearance:none; -webkit-appearance:none; padding-right:40px; cursor:pointer; }
.select-wrap::after {
  content:''; position:absolute; right:14px; top:50%; transform:translateY(-50%);
  border:5px solid transparent; border-top-color:#888; margin-top:3px;
}
.photo-preview-circle {
  width:72px;height:72px;border-radius:50%;
  border:2px dashed #ccc;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:pointer;
}
.photo-preview-circle img { width:100%;height:100%;object-fit:cover; }
</style>
</head>

<body>

<div style="max-width:480px;margin:auto">

<h2>One last step 🎉</h2>

<!-- PHOTO -->
<div>
  <div class="photo-preview-circle" id="photo-circle" onclick="document.getElementById('photo-file').click()">👤</div>
  <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhotoSelect(this)">
  <p id="photo-status">Upload a profile picture</p>
</div>

<input id="name" placeholder="Full name"><br><br>
<input id="phone" placeholder="Phone"><br><br>

<!-- COUNTRY -->
<select id="country" onchange="onCountryChange()">
<option value="">Select country</option>
</select>

<!-- UNIVERSITY -->
<div id="uni-group" style="display:none;margin-top:10px">
<select id="uni-select" onchange="onUniChange()"></select>
<input id="uni-other" placeholder="Type university" style="display:none;margin-top:5px">
</div>

<script>

// FULL COUNTRIES
const COUNTRIES = [
"Afghanistan","Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria",
"Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin",
"Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso",
"Burundi","Cambodia","Cameroon","Canada","Cape Verde","Central African Republic","Chad","Chile",
"China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba","Cyprus","Czech Republic",
"Denmark","Djibouti","Dominica","Dominican Republic","DR Congo","Ecuador","Egypt","El Salvador",
"Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon",
"Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau",
"Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland",
"Israel","Italy","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan",
"Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg",
"Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania",
"Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco",
"Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger",
"Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama",
"Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia",
"Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent","Samoa","San Marino",
"Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone",
"Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea",
"South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan",
"Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia",
"Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom",
"United States","Uruguay","Uzbekistan","Vanuatu","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"
];

// MASSIVE NIGERIA LIST
const UNIVERSITIES = {
"Nigeria": [
"University of Lagos (UNILAG)",
"University of Ibadan (UI)",
"Obafemi Awolowo University (OAU)",
"Ahmadu Bello University (ABU)",
"University of Nigeria Nsukka (UNN)",
"University of Benin (UNIBEN)",
"University of Ilorin (UNILORIN)",
"University of Port Harcourt (UNIPORT)",
"University of Calabar (UNICAL)",
"Nnamdi Azikiwe University (NAU)",
"Lagos State University (LASU)",
"Delta State University (DELSU)",
"Ekiti State University (EKSU)",
"Imo State University (IMSU)",
"Kaduna State University (KASU)",
"Kwara State University (KWASU)",
"Nasarawa State University",
"Rivers State University",
"Ambrose Alli University",
"Olabisi Onabanjo University (OOU)",
"Bayero University Kano (BUK)",
"Federal University of Technology Akure (FUTA)",
"Federal University of Technology Owerri (FUTO)",
"Federal University of Technology Minna (FUTMINNA)",
"Federal University Lokoja",
"Federal University Lafia",
"Federal University Dutse",
"Federal University Dutsin-Ma",
"Federal University Kashere",
"Federal University Gusau",
"Federal University Oye-Ekiti",
"Federal University Wukari",
"Federal University Gashua",
"Federal University Birnin Kebbi",
"Covenant University",
"Babcock University",
"Redeemer's University",
"Bowen University",
"Caleb University",
"Pan-Atlantic University",
"Lead City University",
"American University of Nigeria",
"Baze University",
"Nile University of Nigeria",
"Other (type below)"
]
};

// populate countries
const countryEl = document.getElementById("country");
COUNTRIES.forEach(c=>{
let o=document.createElement("option");
o.textContent=c;
countryEl.appendChild(o);
});

// country change
function onCountryChange(){
let c=countryEl.value;
let group=document.getElementById("uni-group");
let select=document.getElementById("uni-select");
let other=document.getElementById("uni-other");

select.innerHTML="";
other.style.display="none";

if(!c){group.style.display="none";return;}

group.style.display="block";

if(c==="Nigeria"){
UNIVERSITIES["Nigeria"].forEach(u=>{
let o=document.createElement("option");
o.textContent=u;
select.appendChild(o);
});
}else{
select.style.display="none";
other.style.display="block";
}
}

// uni change
function onUniChange(){
let select=document.getElementById("uni-select");
let other=document.getElementById("uni-other");

if(select.value==="Other (type below)"){
other.style.display="block";
}else{
other.style.display="none";
}
}

// image preview
function handlePhotoSelect(input){
let file=input.files[0];
if(!file)return;

let circle=document.getElementById("photo-circle");
let reader=new FileReader();

reader.onload=e=>{
circle.innerHTML=`<img src="${e.target.result}">`;
};

reader.readAsDataURL(file);

document.getElementById("photo-status").innerText=file.name;
}

</script>

</body>
</html>
