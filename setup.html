<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Roomie – Set Up Profile</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d0f14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <style>
    .select-wrap{position:relative;}
    .select-wrap select{appearance:none;-webkit-appearance:none;padding-right:40px;cursor:pointer;}
    .select-wrap::after{content:'';position:absolute;right:14px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-top-color:var(--muted);margin-top:3px;pointer-events:none;}
    .photo-circle{width:72px;height:72px;border-radius:50%;background:var(--card);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:1.8rem;overflow:hidden;flex-shrink:0;cursor:pointer;}
    .photo-circle img{width:100%;height:100%;object-fit:cover;}
    .currency-preview{display:inline-flex;align-items:center;gap:6px;background:rgba(255,107,53,.1);color:var(--accent);border:1px solid rgba(255,107,53,.3);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;margin-top:6px;}
  </style>

<div class="page-full">
<div style="max-width:480px;margin:0 auto;width:100%;padding-bottom:40px">

  <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:4px">One last step 🎉</div>
  <p style="color:var(--muted);font-size:14px;margin-bottom:28px">Set up your profile so students near you can find you.</p>

  <!-- Profile photo -->
  <div class="form-group">
    <label>Profile photo <span style="color:var(--muted)">(optional)</span></label>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="photo-circle" id="photo-circle" onclick="document.getElementById('photo-file').click()">👤</div>
      <div>
        <label for="photo-file" style="display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 16px;cursor:pointer;font-size:14px;font-weight:500;margin-bottom:0">
          📷 Choose photo
        </label>
        <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhoto(this)"/>
        <p class="form-hint" id="photo-status" style="margin-top:6px">Tap to upload</p>
      </div>
    </div>
    <input type="hidden" id="photoURL"/>
  </div>

  <div class="form-group">
    <label>Full name *</label>
    <input type="text" id="name" placeholder="e.g. Emeka Johnson" autocomplete="name"/>
  </div>

  <!-- Country -->
  <div class="form-group">
    <label>Country *</label>
    <div class="select-wrap">
      <select id="country" onchange="onCountryChange()">
        <option value="">— Select your country —</option>
      </select>
    </div>
    <!-- Auto currency preview -->
    <div id="currency-preview" style="display:none" class="currency-preview">
      <span id="currency-flag">🌍</span>
      <span>Listings will show in <strong id="currency-name">USD</strong> (<span id="currency-sym">$</span>)</span>
    </div>
  </div>

  <!-- University (dynamic) -->
  <div class="form-group" id="uni-group" style="display:none">
    <label>University *</label>
    <div class="select-wrap" id="uni-select-wrap">
      <select id="uni-select" onchange="onUniChange()">
        <option value="">— Select your university —</option>
      </select>
    </div>
    <input type="text" id="uni-other" placeholder="Type your university…" style="display:none;margin-top:8px"/>
  </div>

  <div class="form-group">
    <label>City / State *</label>
    <input type="text" id="city" placeholder="e.g. Lagos"/>
  </div>

  <div class="form-group">
    <label>Phone number <span style="color:var(--muted)">(optional — verify later for ✅ badge)</span></label>
    <input type="tel" id="phone" placeholder="+234 800 000 0000" autocomplete="tel"/>
  </div>

  <div class="form-group">
    <label>Course / Department <span style="color:var(--muted)">(optional)</span></label>
    <input type="text" id="course" placeholder="e.g. Computer Science"/>
  </div>

  <div class="form-group">
    <label>Year of study <span style="color:var(--muted)">(optional)</span></label>
    <div class="select-wrap">
      <select id="year">
        <option value="">Select year</option>
        <option>1st year</option><option>2nd year</option>
        <option>3rd year</option><option>4th year</option><option>Postgraduate</option>
      </select>
    </div>
  </div>

  <p id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px"></p>
  <button class="btn btn-primary" id="save-btn" onclick="handleSave()">Save &amp; Continue →</button>

</div>
</div>

// Populate country dropdown
const countryEl = document.getElementById('country');
COUNTRIES.forEach(c => {
  const o = document.createElement('option');
  o.value = c.toLowerCase(); o.textContent = c;
  countryEl.appendChild(o);
});
  window.onCountryChange = function() {
  const countryVal = countryEl.value;
  const countryText = countryEl.options[countryEl.selectedIndex].text;
  const uniGroup = document.getElementById('uni-group');
  const uniSelect = document.getElementById('uni-select');
  const uniOther  = document.getElementById('uni-other');
  const uniWrap   = document.getElementById('uni-select-wrap');

  // Update university list
  uniSelect.innerHTML = '<option value="">— Select your university —</option>';
  uniOther.style.display='none'; uniOther.value='';

  if (!countryVal) { uniGroup.style.display='none'; }
  else {
    uniGroup.style.display='block';
    const unis = UNIVERSITIES[countryText];
    if (unis?.length) {
      unis.forEach(u => { const o=document.createElement('option'); o.value=u; o.textContent=u; uniSelect.appendChild(o); });
      uniWrap.style.display='block'; uniSelect.style.display='block';
    } else {
      uniWrap.style.display='none'; uniOther.style.display='block';
      uniOther.placeholder=`Type your university in ${countryText}…`;
    }
  }

  // Show currency preview
  const curr = CURRENCIES[countryVal] || {code:'USD',symbol:'$',name:'US Dollar',flag:'🌍'};
  const preview = document.getElementById('currency-preview');
  document.getElementById('currency-flag').textContent = curr.flag;
  document.getElementById('currency-name').textContent = curr.name;
  document.getElementById('currency-sym').textContent  = curr.symbol;
  preview.style.display = countryVal ? 'inline-flex' : 'none';
};

window.onUniChange = function() {
  const uniOther = document.getElementById('uni-other');
  uniOther.style.display =
    document.getElementById('uni-select').value==='Other (type below)' ? 'block' : 'none';
};

// Photo upload
window.handlePhoto = async (input) => {
  const file = input.files[0]; if (!file) return;
  const st = document.getElementById('photo-status');
  const circle = document.getElementById('photo-circle');
  const url = URL.createObjectURL(file);
  circle.innerHTML = `<img src="${url}"/>`;
  st.textContent = 'Uploading…';
  try {
    const finalUrl = await uploadImage(file);
    document.getElementById('photoURL').value = finalUrl;
    st.textContent = '✅ Photo uploaded!';
  } catch(_) {
    st.textContent = '⚠️ Upload failed';
    document.getElementById('photoURL').value = '';
  }
};

window.handleSave = async () => {
  const name       = document.getElementById('name').value.trim();
  const countryOpt = countryEl.options[countryEl.selectedIndex];
  const country    = countryOpt?.text || '';
  const countryVal = countryOpt?.value || '';
  const uniWrap    = document.getElementById('uni-select-wrap');
  const uniSelect  = document.getElementById('uni-select');
  const uniOther   = document.getElementById('uni-other');
  let   university = uniWrap.style.display!=='none' && uniSelect.value && uniSelect.value!=='Other (type below)'
    ? uniSelect.value : uniOther.value.trim();
  const city     = document.getElementById('city').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const course   = document.getElementById('course').value.trim();
  const year     = document.getElementById('year').value;
  const photoURL = document.getElementById('photoURL').value.trim();
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('save-btn');

  errEl.style.display='none';
  if (!name||!country||country.startsWith('—')||!university||!city) {
    errEl.textContent='Please fill in name, country, university and city.';
    errEl.style.display='block'; return;
  }

  const u = auth.currentUser;
  if (!u) { location.href='login.html'; return; }

  btn.textContent='Saving…'; btn.disabled=true;

  // Get currency for country
  const curr = CURRENCIES[countryVal] || {code:'USD',symbol:'$',name:'US Dollar'};

  // Get existing profile to preserve verification/referral data
  const existing = await getDoc(doc(db,'users',u.uid));
  const existingData = existing.exists() ? existing.data() : {};

  // Generate referral code if not already set
  const referralCode = existingData.referralCode ||
    (name.replace(/\s+/g,'').toUpperCase().slice(0,6) + Math.random().toString(36).slice(2,5).toUpperCase());

  try {
    await setDoc(doc(db,'users',u.uid), {
      ...existingData,
      uid: u.uid, email: u.email||'',
      name, phone, university,
      country: countryVal,
      countryDisplay: country,
      city: city.toLowerCase().trim(),
      currency: curr.code,
      currencySymbol: curr.symbol,
      currencyName: curr.name,
      photoURL, course, year,
      referralCode,
      verification: existingData.verification || {
        phoneVerified:false, emailVerified:false,
        idVerified:false, idStatus:'unverified', listingVerified:false
      },
      referralCount:    existingData.referralCount    || 0,
      referralEarnings: existingData.referralEarnings || 0,
      referralBalance:  existingData.referralBalance  || 0,
      profileCompletion: photoURL ? 70 : 50,
      createdAt: existingData.createdAt || new Date().toISOString()
    }, {merge:false}); // full set, not merge, so we don't leave stale fields
    location.href='home.html';
  } catch(e) {
    errEl.textContent='Error saving profile: '+e.message;
    errEl.style.display='block';
    btn.textContent='Save & Continue →'; btn.disabled=false;
  }
};

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
