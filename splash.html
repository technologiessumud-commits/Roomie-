<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Roomie</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d0f14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Roomie"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#0d0f14;min-height:100vh;min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:'DM Sans',sans-serif;overflow:hidden;
    }
    /* ── Ring + R ── */
    .wrap{position:relative;width:110px;height:110px;margin-bottom:28px;}

    /* Outer spinning ring — two-tone like PayPal */
    .ring-outer{
      position:absolute;inset:0;border-radius:50%;
      border:5px solid transparent;
      border-top-color:#ff6b35;
      border-right-color:#ffb347;
      border-bottom-color:rgba(255,107,53,.2);
      border-left-color:rgba(255,179,71,.15);
      animation:spin .9s linear infinite;
    }
    /* Inner slower ring — counter-rotate like PayPal */
    .ring-inner{
      position:absolute;inset:10px;border-radius:50%;
      border:3px solid transparent;
      border-top-color:rgba(255,179,71,.5);
      border-bottom-color:rgba(255,107,53,.4);
      animation:spin 1.5s linear infinite reverse;
    }
    /* R mark */
    .r-mark{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      filter:drop-shadow(0 0 14px rgba(255,107,53,.7));
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes spin  {to{transform:rotate(360deg);}}
    @keyframes pulse {0%,100%{filter:drop-shadow(0 0 10px rgba(255,107,53,.5));}
                      50%     {filter:drop-shadow(0 0 22px rgba(255,107,53,.9));}}

    /* Text */
    .wordmark{
      font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;
      color:#f0f2f8;margin-bottom:6px;
    }
    .wordmark span{color:#ff6b35;}
    .tagline{color:#7b82a0;font-size:14px;font-weight:500;letter-spacing:.2px;margin-bottom:32px;}

    /* Bouncing dots */
    .dots{display:flex;gap:7px;}
    .dot{
      width:8px;height:8px;border-radius:50%;background:#ff6b35;
      animation:bounce .8s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.18s;background:#ffb347;}
    .dot:nth-child(3){animation-delay:.36s;background:#ff6b35;}
    @keyframes bounce{
      0%,100%{transform:translateY(0);opacity:.4;}
      50%     {transform:translateY(-9px);opacity:1;}
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="ring-outer"></div>
  <div class="ring-inner"></div>
  <div class="r-mark">
    <svg viewBox="0 0 80 80" fill="none" width="62" height="62">
      <defs>
        <linearGradient id="rg" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ffb347"/>
          <stop offset="100%" stop-color="#ff6b35"/>
        </linearGradient>
      </defs>
      <line x1="26" y1="20" x2="26" y2="60" stroke="url(#rg)" stroke-width="6.5" stroke-linecap="round"/>
      <path d="M26 20 Q44 20 56 30 Q56 42 44 42 L26 42"
        stroke="url(#rg)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <line x1="44" y1="42" x2="58" y2="60" stroke="url(#rg)" stroke-width="6.5" stroke-linecap="round"/>
      <polyline points="34,37 38,30 42,37"
        stroke="url(#rg)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <rect x="34.5" y="37" width="7" height="5" rx="0.5" stroke="url(#rg)" stroke-width="4" fill="none"/>
    </svg>
  </div>
</div>

<div class="wordmark">Room<span>ie</span></div>
<div class="tagline">Finding your perfect room…</div>
<div class="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp({
  apiKey:"AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain:"roomie-f3103.firebaseapp.com",
  projectId:"roomie-f3103",
  storageBucket:"roomie-f3103.firebasestorage.app",
  messagingSenderId:"896474185176",
  appId:"1:896474185176:web:0e4543682f594daf0a86ad"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const MIN  = 2000; // minimum show time (ms)
const t0   = Date.now();

onAuthStateChanged(auth, async user => {
  let dest = 'login.html';
  if (user) {
    try {
      const s = await getDoc(doc(db,'users',user.uid));
      dest = s.exists() ? 'home.html' : 'setup.html';
    } catch(_) {}
  }
  const wait = Math.max(0, MIN - (Date.now() - t0));
  setTimeout(() => location.replace(dest), wait);
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
