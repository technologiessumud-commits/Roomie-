<div class="container" id="room"></div>

<script type="module">
import { db, doc, getDoc } from "./firebase.js";

const id = new URLSearchParams(location.search).get("id");

async function load() {
  const snap = await getDoc(doc(db,"rooms",id));
  const r = snap.data();

  const imgs = r.imageURLs || [];

  room.innerHTML = `
    <div class="card">

      <div style="display:flex;overflow-x:auto;">
        ${imgs.map(i =>
          `<img src="${i}" style="min-width:100%;height:220px;object-fit:cover;">`
        ).join("")}
      </div>

      <div class="container">
        <h2>${r.title}</h2>
        <p>${r.description}</p>
        <h3>₦${r.price}</h3>

        <a href="https://wa.me/?text=Interested in ${r.title}">
          <button class="primary">WhatsApp</button>
        </a>
      </div>

    </div>
  `;
}

load();
</script>
