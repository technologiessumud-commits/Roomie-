<!DOCTYPE html>
<html>
<head>
  <title>Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="room"></div>

<script type="module">
import { db, doc, getDoc } from "./firebase.js";

const id = new URLSearchParams(location.search).get("id");

async function load() {
  const snap = await getDoc(doc(db, "rooms", id));
  const r = snap.data();

  document.getElementById("room").innerHTML = `
    <div class="card">

      <img src="${r.imageURL || 'https://via.placeholder.com/400'}"
      style="width:100%;height:200px;object-fit:cover;border-radius:12px">

      <h2>${r.title}</h2>
      <p>${r.description}</p>
      <p>${r.location}</p>
      <h3>₦${r.price}</h3>

      <p>${r.ownerEmail}</p>

      <a href="https://wa.me/?text=I'm interested in ${r.title}">
        <button class="primary">WhatsApp</button>
      </a>
    </div>
  `;
}

load();
</script>

</body>
</html>
