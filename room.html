<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Room Details</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .carousel-wrap { position: relative; }
    .carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 280px; }
    .carousel::-webkit-scrollbar { display: none; }
    .carousel img { flex-shrink: 0; width: 100%; height: 280px; object-fit: cover; scroll-snap-align: start; }
    .carousel-placeholder { width: 100%; height: 280px; background: var(--card); display: flex; align-items: center; justify-content: center; color: var(--muted); flex-direction: column; gap: 8px; font-size: 14px; }
    .back-overlay {
      position: absolute; top: 16px; left: 16px;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(13,15,20,.7); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 1px solid rgba(255,255,255,.1);
    }
    .dots-overlay { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.4); transition: all .2s; }
    .dot.active { background: #fff; width: 18px; border-radius: 3px; }
    .info-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; font-size: 13px;
    }
    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 20px; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div style="height:280px" class="skeleton"></div>
    <div class="skeleton skeleton-text" style="margin:20px 20px 8px;height:28px"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <!-- Content -->
  <div id="content" style="display:none;padding-bottom:100px">

    <!-- Image carousel -->
    <div class="carousel-wrap" id="carousel-section">
      <button class="back-overlay" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <!-- Info -->
    <div class="room-info">
      <div id="room-type-badge" class="card-tag" style="margin-bottom:10px"></div>
      <h1 class="room-title" id="room-title">—</h1>

      <div class="room-price-row">
        <span class="room-price-big" id="room-price">—</span>
        <span class="room-price-per">/month</span>
      </div>

      <div class="chips-row" id="chips-row"></div>

      <div class="divider"></div>

      <h3 style="margin-bottom:10px;font-family:'Syne',sans-serif">About this room</h3>
      <p class="room-desc" id="room-desc">—</p>

      <div class="divider"></div>

      <h3 style="margin-bottom:12px;font-family:'Syne',sans-serif">Listed by</h3>
      <div class="flex-gap" id="owner-row">
        <div class="avatar" id="owner-avatar">?</div>
        <div>
          <div style="font-weight:600" id="owner-name">—</div>
          <div style="font-size:13px;color:var(--muted)" id="owner-email">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div id="action-bar" style="position:fixed;bottom:0;left:0;right:0;padding:16px 20px;background:var(--bg);border-top:1px solid var(--border);display:none;gap:12px;flex-direction:column">
    <button class="btn btn-whatsapp" id="wa-btn">
      💬 Contact on WhatsApp
    </button>
    <button class="btn btn-secondary btn-sm" id="owner-actions" style="display:none" onclick="window.location.href='list-room.html'">
      ✏️ Edit this listing
    </button>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, getRoom, getProfile } from './firebase.js';

    const user = await requireAuth();
    const params = new URLSearchParams(location.search);
    const roomId = params.get('id');

    if (!roomId) {
      window.location.href = 'home.html';
    }

    const room = await getRoom(roomId);
    if (!room) {
      showToast('Room not found', 'error');
      setTimeout(() => window.location.href = 'home.html', 1500);
    } else {
      renderRoom(room);
    }

    function renderRoom(room) {
      // Carousel
      const cs = document.getElementById('carousel-section');
      if (room.imageURLs && room.imageURLs.length > 0) {
        const carousel = document.createElement('div');
        carousel.className = 'carousel';
        carousel.id = 'carousel';
        room.imageURLs.forEach(url => {
          const img = document.createElement('img');
          img.src = url;
          img.alt = room.title;
          img.onerror = function() {
            this.style.display = 'none';
          };
          carousel.appendChild(img);
        });
        cs.appendChild(carousel);

        // Dots
        if (room.imageURLs.length > 1) {
          const dotsEl = document.createElement('div');
          dotsEl.className = 'dots-overlay';
          room.imageURLs.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = `dot${i === 0 ? ' active' : ''}`;
            dotsEl.appendChild(d);
          });
          cs.appendChild(dotsEl);

          carousel.addEventListener('scroll', () => {
            const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth);
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
          });
        }
      } else {
        const ph = document.createElement('div');
        ph.className = 'carousel-placeholder';
        ph.innerHTML = '<span style="font-size:3rem">📷</span><span>No photos available</span>';
        cs.appendChild(ph);

        // Still show back button without overlay
        const backBtn = cs.querySelector('.back-overlay');
        if (backBtn) backBtn.style.position = 'absolute';
      }

      // Text info
      document.getElementById('room-title').textContent = room.title;
      document.getElementById('room-price').textContent = `$${room.price}`;
      document.getElementById('room-desc').textContent = room.description || 'No description provided.';

      const badge = document.getElementById('room-type-badge');
      badge.textContent = room.type ? room.type.charAt(0).toUpperCase() + room.type.slice(1) : 'Room';

      // Chips
      const chips = document.getElementById('chips-row');
      const chipsData = [
        { icon: '📍', label: room.location || 'Unknown location' },
        { icon: '🏠', label: room.type || 'Room' },
      ];
      chips.innerHTML = chipsData.map(c =>
        `<div class="info-chip">${c.icon} ${escHtml(c.label)}</div>`
      ).join('');

      // Owner
      document.getElementById('owner-name').textContent = room.ownerName || 'Anonymous';
      document.getElementById('owner-email').textContent = room.ownerEmail || '';
      document.getElementById('owner-avatar').textContent = (room.ownerName || 'A')[0].toUpperCase();

      // WhatsApp button
      const waBtn = document.getElementById('wa-btn');
      if (room.whatsapp) {
        const clean = room.whatsapp.replace(/\D/g, '');
        const msg = encodeURIComponent(`Hi! I'm interested in your room listing: "${room.title}" on Roomie.`);
        waBtn.onclick = () => window.open(`https://wa.me/${clean}?text=${msg}`, '_blank');
      } else {
        waBtn.textContent = '📧 ' + (room.ownerEmail || 'Contact not available');
        waBtn.onclick = () => window.open(`mailto:${room.ownerEmail}`, '_blank');
      }

      // Show owner edit option
      if (user.uid === room.ownerUid) {
        document.getElementById('owner-actions').style.display = 'flex';
      }

      // Show content
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('action-bar').style.display = 'flex';
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
