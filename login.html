<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Log In</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="page-full">
  <div class="auth-wrap">
    <div class="auth-logo">Room<span>ie</span></div>
    <p class="auth-subtitle">Welcome back 👋</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@university.edu"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password"/>
    </div>

    <p id="err" style="color:red;display:none"></p>

    <button id="login-btn" onclick="emailSignIn()">Log In</button>

    <div class="auth-footer">
      Don’t have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

window.emailSignIn = async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;

  showErr('');

  if (!email || !pass) {
    showErr('Enter email and password');
    return;
  }

  try {
    const { user } = await signInWithEmailAndPassword(auth, email, pass);

    const snap = await getDoc(doc(db, 'users', user.uid));
    location.href = snap.exists() ? 'home.html' : 'setup.html';

  } catch(e) {
    showErr(e.message);
  }
};

function showErr(msg){
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
