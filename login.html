<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Roomie – Log In</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d0f14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Roomie"/>
</head>
<body>
<script type="module" src="theme.js"></script>

<div class="page-full">
<div class="auth-wrap">

  <div style="display:flex;justify-content:flex-end;margin-bottom:24px">
    <button class="theme-toggle" onclick="import('./theme.js').then(m=>m.toggleTheme())">☀️</button>
  </div>

  <p class="auth-subtitle">Welcome back 👋</p>

  <!-- Loading -->
  <div id="state-loading" style="display:none">
    <div id="loading-text">Signing you in…</div>
  </div>

  <!-- Form -->
  <div id="state-form">

    <button class="social-btn" id="google-btn" onclick="googleSignIn()">
      Continue with Google
    </button>

    <div class="divider-text">or continue with email</div>

    <input type="email" id="email" placeholder="Email"/>
    <input type="password" id="password" placeholder="Password"/>

    <p id="err" style="color:red;display:none"></p>

    <button id="login-btn" onclick="emailSignIn()">Log In</button>

    <div>
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

function showLoading(msg='Loading...'){
  document.getElementById('state-form').style.display='none';
  document.getElementById('state-loading').style.display='block';
  document.getElementById('loading-text').textContent=msg;
}
function showErr(msg){
  const el=document.getElementById('err');
  el.textContent=msg;
  el.style.display=msg?'block':'none';
}

async function afterLogin(user){
  showLoading('Loading profile...');
  const snap = await getDoc(doc(db,'users',user.uid));
  location.href = snap.exists() ? 'home.html' : 'setup.html';
}

onAuthStateChanged(auth,user=>{
  if(user) afterLogin(user);
});

window.googleSignIn = async ()=>{
  try{
    const provider=new GoogleAuthProvider();
    const res=await signInWithPopup(auth,provider);
    await afterLogin(res.user);
  }catch(e){
    showErr(e.message);
  }
};

window.emailSignIn = async ()=>{
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;

  if(!email||!pass){
    showErr('Enter email and password');
    return;
  }

  try{
    const {user}=await signInWithEmailAndPassword(auth,email,pass);

    // ✅ CHECK EMAIL VERIFIED (NEW FIX)
    if(!user.emailVerified){
      showErr('Please verify your email before logging in.');
      return;
    }

    await afterLogin(user);

  }catch(e){
    showErr(e.message);
  }
};
</script>

</body>
</html>
