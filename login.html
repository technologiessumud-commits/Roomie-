<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Log In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-full" style="background:radial-gradient(ellipse at 20% 90%,rgba(255,179,71,.1) 0%,transparent 55%)">
    <div class="auth-wrap">

      <div class="auth-logo">Room<span>ie</span></div>
      <p class="auth-subtitle">Welcome back 👋</p>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@university.edu" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" />
      </div>

      <p id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></p>

      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">
        Log In
      </button>

      <div class="auth-footer" style="margin-top:16px">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>
<!-- YOUR ORIGINAL LOGIN HTML (UNCHANGED UI) -->
<!-- Only JS fixed below -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain: "roomie-f3103.firebaseapp.com",
  projectId: "roomie-f3103",
  storageBucket: "roomie-f3103.firebasestorage.app",
  messagingSenderId: "896474185176",
  appId: "1:896474185176:web:0e4543682f594daf0a86ad"
});

const auth = getAuth(app);
const db = getFirestore(app);

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function afterLogin(user) {
  const snap = await getDoc(doc(db, "users", user.uid));
  location.href = snap.exists() ? "home.html" : "setup.html";
}

window.googleSignIn = async () => {
  const btn = document.getElementById("google-btn");
  btn.disabled = true;

  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });

    const result = await signInWithPopup(auth, provider);

    const snap = await getDoc(doc(db, "users", result.user.uid));
    if (!snap.exists()) {
      await setDoc(doc(db, "users", result.user.uid), {
        uid: result.user.uid,
        email: result.user.email || "",
        name: result.user.displayName || "",
        photoURL: result.user.photoURL || "",
        createdAt: new Date().toISOString()
      });
      location.href = "setup.html";
    } else {
      location.href = "home.html";
    }

  } catch (e) {
    if (e.code !== "auth/popup-closed-by-user") {
      showErr(e.message);
    }
  } finally {
    btn.disabled = false;
  }
};

window.emailSignIn = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    const { user } = await signInWithEmailAndPassword(auth, email, pass);
    await afterLogin(user);
  } catch (e) {
    showErr("Invalid login details");
  }
};

onAuthStateChanged(auth, user => {
  if (user) afterLogin(user);
});
    </script>
  
</body>
</html>
