<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Log In</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="page-full">
  <div class="auth-wrap">
    <div class="auth-logo">Room<span>ie</span></div>
    <p class="auth-subtitle">Welcome back 👋</p>

    <div id="auth-form">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@university.edu"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>

      <p id="err" style="color:var(--danger);display:none;"></p>

      <button class="btn btn-primary" id="login-btn" onclick="emailSignIn()">Log In</button>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp({
  apiKey:"AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain:"roomie-f3103.firebaseapp.com",
  projectId:"roomie-f3103",
  storageBucket:"roomie-f3103.firebasestorage.app",
  messagingSenderId:"896474185176",
  appId:"1:896474185176:web:0e4543682f594daf0a86ad"
});

const auth = getAuth(app);
const db   = getFirestore(app);

window.emailSignIn = async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('login-btn');

  showErr('');

  if (!email || !pass) {
    showErr('Please enter your email and password.');
    return;
  }

  btn.textContent = 'Logging in…';
  btn.disabled = true;

  try {
    const { user } = await signInWithEmailAndPassword(auth, email, pass);

    const snap = await getDoc(doc(db, 'users', user.uid));
    location.href = snap.exists() ? 'home.html' : 'setup.html';

  } catch(e) {
    showErr(e.message);
    btn.textContent = 'Log In';
    btn.disabled = false;
  }
};

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
