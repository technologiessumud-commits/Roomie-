<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Roomie – Home</title>

  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>

  <meta name="theme-color" content="#ff6b35"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">Room<span>ie</span></div>

  <div style="display:flex;gap:10px;align-items:center">

    <a href="messages.html" style="position:relative;color:var(--muted);display:flex">
      <svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span id="msg-badge" class="nav-badge" style="display:none">0</span>
    </a>

    <a href="favourites.html" style="color:var(--muted);display:flex">
      <svg width="24" height="24" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </a>

    <div id="av" class="avatar" onclick="location.href='profile.html'">?</div>

  </div>
</div>

<!-- HERO -->
<div class="hero-section">
  <div class="hero-eyebrow">👋 Welcome back</div>
  <h2 class="hero-title" id="greeting">Find your <span>next room</span></h2>
  <p id="sub">Browse student rooms near you</p>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <input id="search" placeholder="Search..." oninput="doFilter()"/>
</div>

<!-- STATES -->
<div id="s-loading">Loading...</div>

<div id="s-error" style="display:none">
  <p id="err-msg"></p>
</div>

<div id="s-empty" style="display:none">
  <p>No rooms yet</p>
</div>

<div id="s-rooms" style="display:none"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain:"roomie-f3103.firebaseapp.com",
  projectId:"roomie-f3103",
});

const auth = getAuth(app);
const db = getFirestore(app);

let rooms = [];
let profile = null;

// AUTH
onAuthStateChanged(auth, async user => {
  if (!user) {
    location.href = 'login.html';
    return;
  }

  const snap = await getDoc(doc(db,'users',user.uid));
  if (!snap.exists()) {
    location.href = 'setup.html';
    return;
  }

  profile = snap.data();

  document.getElementById('greeting').innerHTML =
    `Hey <span style="color:orange">${profile.name || 'there'}</span> 👋`;

  loadRooms();
});

// LOAD ROOMS
async function loadRooms(){
  show('loading');

  try {
    const snap = await getDocs(collection(db,'rooms'));
    rooms = snap.docs.map(d => ({ id:d.id, ...d.data() }));

    doFilter();

  } catch(e){
    document.getElementById('err-msg').textContent = e.message;
    show('error');
  }
}

// FILTER
window.doFilter = function(){
  const q = search.value.toLowerCase();

  const list = rooms.filter(r =>
    (r.title || '').toLowerCase().includes(q) ||
    (r.location || '').toLowerCase().includes(q)
  );

  if (!list.length) {
    show('empty');
    return;
  }

  renderRooms(list);
  show('rooms');
};

// RENDER
function renderRooms(list){
  s-rooms.innerHTML = list.map(r => `
    <div class="card">
      <h3>${r.title || 'Room'}</h3>
      <p>${r.location || 'No location'}</p>
      <strong>₦${Number(r.price || 0).toLocaleString()}</strong>
    </div>
  `).join('');
}

// STATES
function show(state){
  ['s-loading','s-error','s-empty','s-rooms'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });

  document.getElementById('s-'+state).style.display='block';
}
</script>

</body>
</html>
