<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h3>Roomie</h3>
  <div>
    <a href="list-room.html"><button class="primary">Post</button></a>
    <a href="roommate.html"><button class="secondary">Roommates</button></a>
  </div>
</div>

<div class="container">

<input id="search" placeholder="Search..." oninput="filter()">

<div class="rooms" id="rooms">
  <div class="card skeleton"></div>
</div>

</div>

<script type="module">
import { db, collection, getDocs } from "./firebase.js";

let all = [];

async function load() {
  const snap = await getDocs(collection(db,"rooms"));

  all = [];
  snap.forEach(d => all.push({id:d.id,...d.data()}));

  render(all);
}

function render(data) {
  rooms.innerHTML = "";

  data.forEach(r => {
    const imgs = r.imageURLs || [];

    rooms.innerHTML += `
      <div class="card">

        <div style="display:flex;overflow-x:auto;">
          ${imgs.length ? imgs.map(i =>
            `<img src="${i}" style="min-width:100%;height:180px;object-fit:cover;">`
          ).join("") :
          `<img src="https://via.placeholder.com/400">`}
        </div>

        <div class="container">
          <h3>${r.title}</h3>
          <p>${r.location}</p>
          <h3>₦${r.price}</h3>

          <button onclick="openRoom('${r.id}')" class="primary">View</button>
        </div>

      </div>
    `;
  });
}

window.filter = () => {
  const v = search.value.toLowerCase();
  render(all.filter(r =>
    r.title.toLowerCase().includes(v) ||
    r.location.toLowerCase().includes(v)
  ));
};

window.openRoom = id => location.href = "room.html?id="+id;

load();
</script>

</body>
</html>
