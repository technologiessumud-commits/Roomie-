<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">Room<span>ie</span></div>
    <div id="avatar-btn" class="avatar" style="cursor:pointer" onclick="window.location.href='profile.html'">?</div>
  </div>

  <!-- HERO -->
  <div class="hero-section">
    <div class="hero-eyebrow">👋 Welcome back</div>
    <h2 class="hero-title" id="hero-greeting">Find your <span>next room</span></h2>
    <p class="hero-sub" id="hero-sub">Browse rooms near your campus</p>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search by title or location…" oninput="filterRooms()" />
    </div>
  </div>

  <!-- FILTER ROW -->
  <div class="filter-row">
    <button class="filter-chip active" onclick="setPriceFilter(0, this)">All prices</button>
    <button class="filter-chip" onclick="setPriceFilter(100, this)">Under $100</button>
    <button class="filter-chip" onclick="setPriceFilter(200, this)">Under $200</button>
    <button class="filter-chip" onclick="setPriceFilter(300, this)">Under $300</button>
    <button class="filter-chip" onclick="setPriceFilter(500, this)">Under $500</button>
  </div>

  <!-- ROOMS SECTION -->
  <div class="section-header">
    <span class="section-title">Available Rooms</span>
    <span id="room-count" class="text-muted" style="font-size:13px"></span>
  </div>

  <!-- Loading skeletons -->
  <div id="skeleton-loader">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <!-- Rooms grid -->
  <div id="rooms-container" class="rooms-grid" style="display:none"></div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon">🏠</div>
    <div class="empty-title">No rooms found</div>
    <p class="empty-sub">Try adjusting your search or filters</p>
    <a href="list-room.html" class="btn btn-primary btn-sm mt-16">Post the first room</a>
  </div>

  <!-- FAB: Post room -->
  <a href="list-room.html" class="fab" title="Post a room">+</a>

  <!-- BOTTOM NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="roommate.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Roommates
    </a>
    <a href="list-room.html" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Post
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, getRooms, getProfile } from './firebase.js';

    let allRooms = [];
    let maxPrice = 0; // 0 = no limit

    // Auth guard
    const user = await requireAuth();

    // Load greeting
    const profile = await getProfile(user.uid);
    if (profile) {
      const firstName = profile.name.split(' ')[0];
      document.getElementById('hero-greeting').innerHTML = `Hey, <span style="color:var(--accent)">${firstName}</span> 👋`;
      document.getElementById('hero-sub').textContent = `Find your next room near ${profile.university}`;
      document.getElementById('avatar-btn').textContent = firstName[0].toUpperCase();
    }

    // Load rooms
    async function loadRooms() {
      try {
        allRooms = await getRooms();
        document.getElementById('skeleton-loader').style.display = 'none';
        document.getElementById('rooms-container').style.display = 'flex';
        renderRooms(allRooms);
      } catch (err) {
        console.error(err);
        showToast('Failed to load rooms', 'error');
      }
    }

    function renderRooms(rooms) {
      const container = document.getElementById('rooms-container');
      const empty     = document.getElementById('empty-state');
      const countEl   = document.getElementById('room-count');

      countEl.textContent = `${rooms.length} listing${rooms.length !== 1 ? 's' : ''}`;

      if (rooms.length === 0) {
        container.style.display = 'none';
        empty.style.display = 'flex';
        return;
      }

      container.style.display = 'flex';
      empty.style.display = 'none';

      container.innerHTML = rooms.map(room => {
        const img = room.imageURLs && room.imageURLs.length > 0
          ? `<img class="card-img" src="${room.imageURLs[0]}" alt="${room.title}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>📷 No image</div>'" />`
          : `<div class="card-img-placeholder">📷 No image</div>`;

        return `
          <div class="card" onclick="window.location.href='room.html?id=${room.id}'" style="cursor:pointer">
            ${img}
            <div class="card-body">
              <div class="card-title">${escHtml(room.title)}</div>
              <div class="card-meta">📍 ${escHtml(room.location || 'Location not specified')}</div>
              <div class="flex-between">
                <span class="card-price">$${room.price}<span style="font-size:12px;font-weight:400;color:var(--muted)">/mo</span></span>
                <span class="badge">View details →</span>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    window.filterRooms = function () {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = allRooms.filter(r => {
        const matchText = r.title.toLowerCase().includes(q)
          || (r.location || '').toLowerCase().includes(q)
          || (r.description || '').toLowerCase().includes(q);
        const matchPrice = maxPrice === 0 || r.price <= maxPrice;
        return matchText && matchPrice;
      });
      renderRooms(filtered);
    };

    window.setPriceFilter = function (price, el) {
      maxPrice = price;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filterRooms();
    };

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadRooms();
  </script>
</body>
    </html>
