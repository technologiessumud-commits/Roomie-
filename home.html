<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Home</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#ff6b35"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Roomie"/>
  <link rel="manifest" href="manifest.json">
  
  <style>
    .card { position:relative; }
    .fav-btn {
      position:absolute; top:10px; right:10px;
      width:34px; height:34px; border-radius:50%;
      background:rgba(0,0,0,.5); border:none; cursor:pointer;
      font-size:1rem; display:flex; align-items:center; justify-content:center; z-index:2;
    }
    .card-actions {
      display:flex; gap:8px; padding:0 14px 14px;
    }
    .card-actions button {
      flex:1; padding:9px; border-radius:8px;
      border:1.5px solid var(--border); background:transparent;
      color:var(--text); font-size:13px; font-weight:600;
      cursor:pointer; font-family:'Syne',sans-serif;
    }
    /* Unread badge */
    .nav-badge {
      position:absolute; top:-4px; right:-4px;
      min-width:18px; height:18px; border-radius:9px;
      background:var(--danger); color:#fff;
      font-size:10px; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      padding:0 4px; border:2px solid var(--bg);
      line-height:1;
    }
    .nav-item { position:relative; }
    .card-actions .btn-main {
      flex:2; background:var(--accent); color:#fff; border-color:var(--accent);
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">Room<span>ie</span></div>
  <div style="display:flex;gap:12px;align-items:center">
    <a href="messages.html" style="font-size:1.2rem;color:var(--muted)">💬</a>
    <a href="favourites.html" style="font-size:1.2rem;color:var(--muted)">❤️</a>
    <div id="av" class="avatar" style="width:36px;height:36px;font-size:.9rem;cursor:pointer" onclick="location.href='profile.html'">?</div>
  </div>
</div>

<!-- HERO -->
<div class="hero-section">
  <div class="hero-eyebrow">👋 Welcome back</div>
  <h2 class="hero-title" id="greeting">Find your <span>next room</span></h2>
  <p style="color:var(--muted);font-size:14px" id="sub">Browse student rooms near you</p>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search by title or location…" oninput="doFilter()"/>
  </div>
</div>

<!-- SCOPE FILTER -->
<div class="filter-row">
  <button class="filter-chip active" id="sc-all"     onclick="setScope('all',this)">🌐 All Rooms</button>
  <button class="filter-chip"        id="sc-uni"     onclick="setScope('uni',this)">🎓 My University</button>
  <button class="filter-chip"        id="sc-country" onclick="setScope('country',this)">🌍 My Country</button>
</div>

<!-- PRICE FILTER -->
<div class="filter-row" style="padding-top:0">
  <button class="filter-chip active" onclick="setPrice(0,this)">Any price</button>
  <button class="filter-chip" onclick="setPrice(50000,this)">Under ₦50k</button>
  <button class="filter-chip" onclick="setPrice(100000,this)">Under ₦100k</button>
  <button class="filter-chip" onclick="setPrice(200000,this)">Under ₦200k</button>
  <button class="filter-chip" onclick="setPrice(500000,this)">Under ₦500k</button>
</div>

<!-- HEADER -->
<div class="section-header">
  <span class="section-title" id="section-title">All Rooms</span>
  <span id="count" style="font-size:13px;color:var(--muted)"></span>
</div>

<!-- SKELETON -->
<div id="skeleton" style="padding:0 20px">
  <div class="skeleton skeleton-card" style="margin-bottom:16px"></div>
  <div class="skeleton skeleton-card"></div>
</div>

<!-- ERROR -->
<div id="box-error" class="empty-state" style="display:none">
  <div style="font-size:2.5rem">⚠️</div>
  <div class="empty-title">Couldn't load rooms</div>
  <p class="empty-sub" id="err-msg"></p>
  <button onclick="loadRooms()" class="btn btn-primary btn-sm mt-16">Retry</button>
</div>

<!-- EMPTY -->
<div id="box-empty" class="empty-state" style="display:none">
  <div style="font-size:2.5rem">🏠</div>
  <div class="empty-title" id="empty-title">No rooms yet</div>
  <p class="empty-sub" id="empty-sub">Be the first to post!</p>
  <a href="list-room.html" class="btn btn-primary btn-sm mt-16">Post a room</a>
</div>

<!-- ROOMS -->
<div id="box-rooms" class="rooms-grid" style="display:none;padding-bottom:120px"></div>

<!-- FAB -->
<a href="list-room.html" class="fab">+</a>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="home.html" class="nav-item active">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </a>
  <a href="roommate.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Roommates
  </a>
  <a href="list-room.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Post
  </a>
  <a href="messages.html" class="nav-item" id="nav-messages">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Messages
    <span id="msg-badge" class="nav-badge" style="display:none">0</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<div id="toast" class="toast"></div>

<!-- ── SCRIPT: raw Firebase CDN, no module wrapper ─────── -->
<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── Config ── */
const cfg = {
  apiKey:            "AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain:        "roomie-f3103.firebaseapp.com",
  projectId:         "roomie-f3103",
  storageBucket:     "roomie-f3103.firebasestorage.app",
  messagingSenderId: "896474185176",
  appId:             "1:896474185176:web:0e4543682f594daf0a86ad"
};
const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

/* ── State ── */
let rooms   = [];
let favs    = [];
let profile = null;
let myUid   = null;
let scope   = 'all';
let maxP    = 0;

/* ── Auth: fires from local cache, nearly instant ── */
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'login.html'; return; }
  myUid = user.uid;

  /* load profile */
  try {
    const s = await getDoc(doc(db, 'users', myUid));
    if (!s.exists()) { location.href = 'setup.html'; return; }
    profile = s.data();
  } catch(e) {
    showErr('Could not load your profile: ' + e.message); return;
  }

  /* load favs — silently ignore errors */
  try {
    const s = await getDoc(doc(db, 'favourites', myUid));
    favs = s.exists() ? (s.data().items || []) : [];
  } catch(_) { favs = []; }

  /* update header */
  const fn = (profile.name || 'there').split(' ')[0];
  document.getElementById('greeting').innerHTML =
    `Hey <span style="color:var(--accent)">${fn}</span> 👋`;
  document.getElementById('sub').textContent =
    profile.university || 'Browse student rooms';

  const av = document.getElementById('av');
  if (profile.photoURL) {
    av.innerHTML = '';
    av.style.cssText = 'width:36px;height:36px;border-radius:50%;overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid var(--border)';
    const img = document.createElement('img');
    img.src = profile.photoURL;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover';
    img.onerror = () => { av.textContent = fn[0]; };
    av.appendChild(img);
  } else {
    av.textContent = fn[0].toUpperCase();
  }

  if (profile.university) {
    const short = profile.university.split(' ').slice(0,3).join(' ');
    document.getElementById('sc-uni').textContent = '🎓 ' + short;
  }
  if (profile.countryDisplay || profile.country) {
    document.getElementById('sc-country').textContent =
      '🌍 ' + (profile.countryDisplay || profile.country);
  }

  listenUnread(myUid);
  loadRooms();
});

/* ── Load all rooms ── */
window.loadRooms = async function() {
  show('skeleton');
  try {
    const snap = await getDocs(collection(db, 'rooms'));
    rooms = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    doFilter();
  } catch(e) {
    showErr('Failed to load rooms: ' + e.message);
  }
};

/* ── Filter ── */
window.doFilter = function() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let list = rooms.filter(r => {
    if (q && !(r.title||'').toLowerCase().includes(q) && !(r.location||'').toLowerCase().includes(q)) return false;
    if (maxP && r.price > maxP) return false;
    if (scope === 'uni' && profile)
      if ((r.ownerUniversity||'').toLowerCase() !== (profile.university||'').toLowerCase()) return false;
    if (scope === 'country' && profile)
      if ((r.ownerCountry||'').toLowerCase() !== (profile.country||'').toLowerCase()) return false;
    return true;
  });

  document.getElementById('count').textContent = list.length + ' listing' + (list.length !== 1 ? 's' : '');

  if (!list.length) {
    const msgs = {
      uni:     ['No rooms at your university yet', 'Switch to All Rooms to see more.'],
      country: ['No rooms in your country yet',    'Switch to All Rooms to see more.'],
      all:     ['No rooms posted yet',             'Be the first to post!']
    };
    const [t,s] = msgs[scope] || msgs.all;
    document.getElementById('empty-title').textContent = t;
    document.getElementById('empty-sub').textContent   = s;
    show('empty'); return;
  }

  render(list);
};

/* ── Render cards ── */
function render(list) {
  const box = document.getElementById('box-rooms');
  box.innerHTML = list.map(r => {
    const isFav = favs.includes(r.id);
    const isOcc = r.status === 'occupied';
    const isOwn = r.ownerUid === myUid;

    const imgHtml = r.imageURLs && r.imageURLs.length
      ? `<div style="position:relative">
           <img class="card-img" src="${r.imageURLs[0]}" alt=""
             onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>📷</div>'"/>
           ${isOcc ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center">
             <span style="background:var(--danger);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700">🔒 Occupied</span>
           </div>` : ''}
           <button class="fav-btn" onclick="event.stopPropagation();fav('${r.id}',this)">${isFav?'❤️':'🤍'}</button>
         </div>`
      : `<div class="card-img-placeholder">📷 No image</div>`;

    const uniLine = scope !== 'uni' && r.ownerUniversity
      ? `<div class="card-meta" style="font-size:12px">🎓 ${e(r.ownerUniversity)}</div>` : '';

    return `
      <div class="card" style="${isOcc?'opacity:.75':''}">
        <div onclick="location.href='room.html?id=${r.id}'" style="cursor:pointer">
          ${imgHtml}
          <div class="card-body">
            <div class="card-title">${e(r.title)}</div>
            <div class="card-meta">📍 ${e(r.location||'—')}</div>
            ${uniLine}
            <div style="margin-top:8px">
              <span class="card-price">${r.currencySymbol||'₦'}${Number(r.price||0).toLocaleString()}<span style="font-size:11px;font-weight:400;color:var(--muted)">/mo</span></span>
            </div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-main" onclick="location.href='room.html?id=${r.id}'">View Room</button>
          ${!isOwn ? `
          <button onclick="location.href='chat.html?uid=${r.ownerUid}&name=${encodeURIComponent(r.ownerName||'Owner')}'" title="Message">✉️</button>
          <button onclick="location.href='user-profile.html?uid=${r.ownerUid}'" title="View profile">👤</button>
          ` : ''}
        </div>
      </div>`;
  }).join('');
  show('rooms');
}

/* ── Favourites ── */
window.fav = async function(roomId, btn) {
  try {
    const ref  = doc(db, 'favourites', myUid);
    const snap = await getDoc(ref);
    const items = snap.exists() ? (snap.data().items || []) : [];
    const idx = items.indexOf(roomId);
    if (idx === -1) items.push(roomId); else items.splice(idx,1);
    await setDoc(ref, { items }, { merge:true });
    const saved = items.includes(roomId);
    btn.textContent = saved ? '❤️' : '🤍';
    saved ? favs.push(roomId) : (favs = favs.filter(i => i !== roomId));
    toast(saved ? 'Saved ❤️' : 'Removed');
  } catch(e) { toast('Error: ' + e.message); }
};

/* ── Scope / price controls ── */
window.setScope = function(val, el) {
  scope = val;
  ['sc-all','sc-uni','sc-country'].forEach(id =>
    document.getElementById(id).classList.remove('active')
  );
  el.classList.add('active');
  document.getElementById('section-title').textContent =
    { all:'All Rooms', uni:'My University', country:'My Country' }[val];
  doFilter();
};

window.setPrice = function(val, el) {
  maxP = val;
  document.querySelectorAll('.filter-row').forEach(row =>
    row.querySelectorAll('.filter-chip').forEach(c => {
      if (c.textContent.includes('₦') || c.textContent === 'Any price')
        c.classList.remove('active');
    })
  );
  el.classList.add('active');
  doFilter();
};

/* ── UI helpers ── */
function show(s) {
  document.getElementById('skeleton').style.display  = s==='skeleton' ? 'block' : 'none';
  document.getElementById('box-error').style.display = s==='error'    ? 'flex'  : 'none';
  document.getElementById('box-empty').style.display = s==='empty'    ? 'flex'  : 'none';
  document.getElementById('box-rooms').style.display = s==='rooms'    ? 'flex'  : 'none';
}

function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  show('error');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function e(s) {
  const d = document.createElement('div');
  d.textContent = s; return d.innerHTML;
}

// ── Unread message badge ──────────────────────────────────
import { onSnapshot, query as q2, collection as col2, where as w2 }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function listenUnread(uid) {
  // Listen to chats where user is participant
  const chatsQ = q2(col2(db, 'chats'), w2('participants', 'array-contains', uid));
  onSnapshot(chatsQ, async snap => {
    let total = 0;
    for (const chatDoc of snap.docs) {
      // Count unread messages (not sent by me, read=false)
      const msgsQ = q2(
        col2(db, 'chats', chatDoc.id, 'messages'),
        w2('senderUid', '!=', uid),
        w2('read', '==', false)
      );
      const msgsSnap = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")
        .then(m => m.getDocs(msgsQ));
      total += msgsSnap.size;
    }
    const badge = document.getElementById('msg-badge');
    if (total > 0) {
      badge.textContent = total > 99 ? '99+' : total;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }
  });
}

// Register SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
