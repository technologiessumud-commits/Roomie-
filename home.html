<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Home</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .fav-btn {
      position:absolute; top:10px; right:10px;
      width:34px; height:34px; border-radius:50%;
      background:rgba(13,15,20,.65); backdrop-filter:blur(6px);
      border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; transition:transform .2s;
    }
    .fav-btn:active { transform:scale(1.3); }
    .card { position:relative; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Room<span>ie</span></div>
  <div style="display:flex;gap:10px;align-items:center">
    <a href="favourites.html" style="color:var(--muted);font-size:1.3rem;line-height:1">❤️</a>
    <div id="avatar-btn" class="avatar" style="cursor:pointer" onclick="window.location.href='profile.html'">?</div>
  </div>
</div>

<div class="hero-section">
  <div class="hero-eyebrow" id="hero-eyebrow">👋 Welcome back</div>
  <h2 class="hero-title" id="hero-greeting">Find your <span>next room</span></h2>
  <p class="hero-sub" id="hero-sub">Browse rooms near your campus</p>
</div>

<div class="search-wrap">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search title or location…" oninput="filterRooms()"/>
  </div>
</div>

<div class="filter-row">
  <button class="filter-chip active" id="chip-uni"     onclick="setScopeFilter('uni',this)">🎓 My University</button>
  <button class="filter-chip"        id="chip-country" onclick="setScopeFilter('country',this)">🌍 My Country</button>
  <button class="filter-chip"        id="chip-all"     onclick="setScopeFilter('all',this)">🌐 All Schools</button>
</div>
<div class="filter-row" style="padding-top:0">
  <button class="filter-chip active" id="price-any" onclick="setPriceFilter(0,this)">Any price</button>
  <button class="filter-chip" onclick="setPriceFilter(50000,this)">Under ₦50k</button>
  <button class="filter-chip" onclick="setPriceFilter(100000,this)">Under ₦100k</button>
  <button class="filter-chip" onclick="setPriceFilter(200000,this)">Under ₦200k</button>
  <button class="filter-chip" onclick="setPriceFilter(500000,this)">Under ₦500k</button>
</div>

<div class="section-header">
  <span class="section-title" id="section-label">My University</span>
  <span id="room-count" class="text-muted" style="font-size:13px"></span>
</div>

<div id="skeleton-loader">
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
</div>

<div id="rooms-container" class="rooms-grid" style="display:none"></div>

<div id="empty-state" class="empty-state" style="display:none">
  <div class="empty-icon">🏠</div>
  <div class="empty-title" id="empty-title">No rooms at your university yet</div>
  <p class="empty-sub" id="empty-sub">Be the first to post, or switch to a wider filter.</p>
  <a href="list-room.html" class="btn btn-primary btn-sm mt-16">Post the first room</a>
</div>

<a href="list-room.html" class="fab" title="Post a room">+</a>

<nav class="navbar">
  <a href="home.html" class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </a>
  <a href="roommate.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Roommates
  </a>
  <a href="list-room.html" class="nav-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Post
  </a>
  <a href="favourites.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Saved
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<div id="toast" class="toast"></div>

<script type="module">
  import { requireAuth, getRooms, getProfile, getFavourites, toggleFavourite } from './firebase.js';

  let allRooms    = [];
  let maxPrice    = 0;
  let scopeFilter = 'uni';
  let userProfile = null;
  let favourites  = [];

  const user = await requireAuth();
  [userProfile, favourites] = await Promise.all([
    getProfile(user.uid),
    getFavourites(user.uid)
  ]);

  if (userProfile) {
    const fn = userProfile.name.split(' ')[0];
    document.getElementById('hero-greeting').innerHTML = `Hey, <span style="color:var(--accent)">${fn}</span> 👋`;
    document.getElementById('hero-sub').textContent    = `Showing rooms at ${userProfile.university}`;
    document.getElementById('avatar-btn').textContent  = fn[0].toUpperCase();
    const uniShort = userProfile.university.length > 18
      ? userProfile.university.split(' ').slice(0,3).join(' ')+'…'
      : userProfile.university;
    document.getElementById('chip-uni').textContent     = `🎓 ${uniShort}`;
    document.getElementById('chip-country').textContent = `🌍 ${userProfile.countryDisplay || cap(userProfile.country)}`;
  }

  async function loadRooms() {
    try {
      allRooms = await getRooms();
      document.getElementById('skeleton-loader').style.display = 'none';
      document.getElementById('rooms-container').style.display = 'flex';
      filterRooms();
    } catch(e) { showToast('Failed to load rooms','error'); }
  }

  function renderRooms(rooms) {
    const container = document.getElementById('rooms-container');
    const empty     = document.getElementById('empty-state');
    document.getElementById('room-count').textContent = `${rooms.length} listing${rooms.length!==1?'s':''}`;

    if (!rooms.length) {
      container.style.display = 'none'; empty.style.display = 'flex';
      const msgs = {
        uni:     ['No rooms at your university yet','Switch to "My Country" or "All Schools" to see more.'],
        country: ['No rooms in your country yet','Switch to "All Schools" to see worldwide listings.'],
        all:     ['No rooms found','Try adjusting your search or price filter.']
      };
      document.getElementById('empty-title').textContent = msgs[scopeFilter][0];
      document.getElementById('empty-sub').textContent   = msgs[scopeFilter][1];
      return;
    }
    container.style.display = 'flex'; empty.style.display = 'none';

    container.innerHTML = rooms.map(room => {
      const isFav    = favourites.includes(room.id);
      const isOccupied = room.status === 'occupied';
      const img = room.imageURLs?.length
        ? `<div style="position:relative">
             <img class="card-img" src="${room.imageURLs[0]}" alt="${room.title}"
               onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>📷 No image</div>'"/>
             ${isOccupied ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center"><span style="background:var(--danger);color:#fff;font-family:Syne,sans-serif;font-weight:700;font-size:13px;padding:6px 14px;border-radius:20px">🔒 Occupied</span></div>' : ''}
             <button class="fav-btn" onclick="event.stopPropagation();toggleFav('${room.id}',this)">${isFav?'❤️':'🤍'}</button>
           </div>`
        : `<div class="card-img-placeholder">📷 No image</div>`;

      const uniLabel = scopeFilter !== 'uni' && room.ownerUniversity
        ? `<div class="card-meta">🎓 ${escHtml(room.ownerUniversity)}</div>` : '';
      const sameUni = userProfile && room.ownerUniversity &&
        room.ownerUniversity.toLowerCase() === userProfile.university.toLowerCase();

      return `
        <div class="card" onclick="window.location.href='room.html?id=${room.id}'" style="cursor:pointer;${isOccupied?'opacity:.7':''}">
          ${img}
          <div class="card-body">
            ${sameUni && scopeFilter!=='uni' ? '<span class="card-tag" style="margin-bottom:8px;display:inline-block">🎓 Your University</span>' : ''}
            <div class="card-title">${escHtml(room.title)}</div>
            <div class="card-meta">📍 ${escHtml(room.location||'Location not specified')}</div>
            ${uniLabel}
            <div class="flex-between" style="margin-top:8px">
              <span class="card-price">₦${Number(room.price).toLocaleString()}<span style="font-size:12px;font-weight:400;color:var(--muted)">/mo</span></span>
              ${isOccupied ? '<span style="font-size:12px;color:var(--danger);font-weight:600">Occupied</span>' : '<span class="badge">View →</span>'}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  window.toggleFav = async (roomId, btn) => {
    const isSaved = await toggleFavourite(user.uid, roomId);
    btn.textContent = isSaved ? '❤️' : '🤍';
    if (isSaved) favourites.push(roomId);
    else favourites = favourites.filter(id => id !== roomId);
    showToast(isSaved ? 'Saved to favourites ❤️' : 'Removed from favourites', isSaved ? 'success' : '');
  };

  window.filterRooms = function() {
    const q = document.getElementById('search-input').value.toLowerCase();
    let filtered = allRooms.filter(r => {
      const matchText  = r.title.toLowerCase().includes(q) || (r.location||'').toLowerCase().includes(q);
      const matchPrice = maxPrice === 0 || r.price <= maxPrice;
      let   matchScope = true;
      if (scopeFilter==='uni' && userProfile)
        matchScope = r.ownerUniversity?.toLowerCase() === userProfile.university.toLowerCase();
      else if (scopeFilter==='country' && userProfile)
        matchScope = r.ownerCountry?.toLowerCase() === userProfile.country.toLowerCase();
      return matchText && matchPrice && matchScope;
    });
    if (userProfile && scopeFilter!=='uni') {
      filtered.sort((a,b) => {
        const am = (a.ownerUniversity||'').toLowerCase()===userProfile.university.toLowerCase();
        const bm = (b.ownerUniversity||'').toLowerCase()===userProfile.university.toLowerCase();
        return bm-am;
      });
    }
    renderRooms(filtered);
  };

  window.setScopeFilter = function(scope, el) {
    scopeFilter = scope;
    ['chip-uni','chip-country','chip-all'].forEach(id => document.getElementById(id).classList.remove('active'));
    el.classList.add('active');
    const labels = {uni:'My University',country:'My Country',all:'All Schools'};
    document.getElementById('section-label').textContent = labels[scope];
    if (userProfile) {
      const subs = {
        uni:     `Showing rooms at ${userProfile.university}`,
        country: `Showing rooms in ${userProfile.countryDisplay||cap(userProfile.country)}`,
        all:     'Showing all rooms worldwide'
      };
      document.getElementById('hero-sub').textContent = subs[scope];
    }
    filterRooms();
  };

  window.setPriceFilter = function(price, el) {
    maxPrice = price;
    document.querySelectorAll('.filter-row').forEach(row =>
      row.querySelectorAll('.filter-chip').forEach(c => {
        if (c.textContent.includes('₦')||c.textContent==='Any price') c.classList.remove('active');
      })
    );
    el.classList.add('active');
    filterRooms();
  };

  function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):''; }
  function escHtml(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
  function showToast(msg,type=''){
    const t=document.getElementById('toast');
    t.textContent=msg; t.className=`toast ${type} show`;
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  loadRooms();
</script>
</body>
</html>
