<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Chat</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

    .chat-topbar {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; background:var(--surface);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .chat-avatar-sm {
      width:40px; height:40px; border-radius:50%;
      object-fit:cover; flex-shrink:0;
    }
    .chat-avatar-sm-init {
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-weight:800; color:#fff;
      font-size:.95rem; flex-shrink:0;
    }

    .messages-area {
      flex:1; overflow-y:auto; padding:16px;
      display:flex; flex-direction:column; gap:10px;
      scroll-behavior:smooth;
    }

    .bubble-wrap {
      display:flex; flex-direction:column;
      max-width:78%;
    }
    .bubble-wrap.mine  { align-self:flex-end; align-items:flex-end; }
    .bubble-wrap.theirs { align-self:flex-start; align-items:flex-start; }

    .bubble {
      padding:10px 14px; border-radius:18px;
      font-size:14px; line-height:1.5; word-break:break-word;
    }
    .bubble.mine {
      background:var(--accent); color:#fff;
      border-bottom-right-radius:4px;
    }
    .bubble.theirs {
      background:var(--card); color:var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius:4px;
    }
    .bubble-time {
      font-size:11px; color:var(--muted); margin-top:3px; padding:0 4px;
    }

    /* date divider */
    .date-divider {
      display:flex; align-items:center; gap:10px;
      color:var(--muted); font-size:12px; margin:8px 0;
    }
    .date-divider::before,.date-divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }

    .input-bar {
      display:flex; align-items:flex-end; gap:10px;
      padding:10px 14px; background:var(--surface);
      border-top:1px solid var(--border); flex-shrink:0;
    }
    .msg-input {
      flex:1; background:var(--card); border:1.5px solid var(--border);
      border-radius:22px; padding:10px 16px;
      font-size:15px; color:var(--text); resize:none;
      max-height:120px; overflow-y:auto; line-height:1.4;
      outline:none; font-family:'DM Sans',sans-serif;
    }
    .msg-input:focus { border-color:var(--accent); }
    .send-btn {
      width:42px; height:42px; border-radius:50%;
      background:var(--accent); color:#fff; border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; transition:transform .15s;
    }
    .send-btn:active { transform:scale(.93); }
    .send-btn:disabled { background:var(--border); }

    .typing-indicator {
      display:none; padding:0 16px 8px;
      font-size:12px; color:var(--muted); font-style:italic;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="chat-topbar">
  <button class="back-btn" onclick="history.back()" style="flex-shrink:0">
    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div id="their-avatar-wrap"></div>
  <div style="flex:1;min-width:0">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="their-name">—</div>
    <div style="font-size:12px;color:var(--muted)" id="their-uni"></div>
  </div>
</div>

<!-- MESSAGES -->
<div class="messages-area" id="messages-area">
  <div style="text-align:center;color:var(--muted);font-size:13px;padding:20px 0" id="loading-msgs">Loading messages…</div>
</div>

<!-- TYPING -->
<div class="typing-indicator" id="typing-indicator">typing…</div>

<!-- INPUT BAR -->
<div class="input-bar">
  <textarea class="msg-input" id="msg-input" placeholder="Message…" rows="1"
    oninput="autoResize(this)"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
  ></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMsg()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script type="module">
  import { requireAuth, getProfile, getOrCreateChat, sendMessage, listenMessages, chatId } from './firebase.js';

  const params   = new URLSearchParams(location.search);
  const theirUid = params.get('uid');
  const theirNameParam = params.get('name') || 'User';

  if (!theirUid) { window.location.href = 'messages.html'; }

  const user = await requireAuth();
  if (user.uid === theirUid) { window.location.href = 'messages.html'; }

  // Load both profiles
  const [myProfile, theirProfile] = await Promise.all([
    getProfile(user.uid),
    getProfile(theirUid)
  ]);

  const theirName  = theirProfile?.name    || theirNameParam;
  const theirPhoto = theirProfile?.photoURL || '';
  const theirUni   = theirProfile?.university || '';

  // Set header
  document.getElementById('their-name').textContent = theirName;
  document.getElementById('their-uni').textContent  = theirUni;
  const avatarWrap = document.getElementById('their-avatar-wrap');
  if (theirPhoto) {
    avatarWrap.innerHTML = `<img src="${theirPhoto}" class="chat-avatar-sm" onerror="this.outerHTML='<div class=chat-avatar-sm-init>${theirName[0].toUpperCase()}</div>'"/>`;
  } else {
    avatarWrap.innerHTML = `<div class="chat-avatar-sm-init">${theirName[0].toUpperCase()}</div>`;
  }

  // Get or create chat
  const chatDocId = await getOrCreateChat(user.uid, theirUid, myProfile, theirProfile || { name: theirNameParam, photoURL: '' });

  // Listen for messages
  let prevDate = '';
  let unsubscribe;

  unsubscribe = listenMessages(chatDocId, messages => {
    const area = document.getElementById('messages-area');
    document.getElementById('loading-msgs').style.display = 'none';

    if (!messages.length) {
      area.innerHTML = `
        <div style="text-align:center;padding:40px 20px">
          <div style="font-size:2.5rem;margin-bottom:12px">👋</div>
          <div style="font-weight:600;font-family:'Syne',sans-serif;margin-bottom:6px">Say hello!</div>
          <div style="color:var(--muted);font-size:13px">Start the conversation with ${escHtml(theirName)}</div>
        </div>`;
      return;
    }

    prevDate = '';
    area.innerHTML = messages.map(msg => {
      const isMine  = msg.senderUid === user.uid;
      const time    = msg.timestamp?.seconds
        ? new Date(msg.timestamp.seconds * 1000).toLocaleTimeString('en', { hour:'2-digit', minute:'2-digit' })
        : '';
      const dateStr = msg.timestamp?.seconds
        ? new Date(msg.timestamp.seconds * 1000).toLocaleDateString('en', { weekday:'short', month:'short', day:'numeric' })
        : '';

      let divider = '';
      if (dateStr && dateStr !== prevDate) {
        divider   = `<div class="date-divider">${dateStr}</div>`;
        prevDate  = dateStr;
      }

      return `
        ${divider}
        <div class="bubble-wrap ${isMine?'mine':'theirs'}">
          <div class="bubble ${isMine?'mine':'theirs'}">${escHtml(msg.text)}</div>
          <div class="bubble-time">${time}</div>
        </div>`;
    }).join('');

    // Scroll to bottom
    area.scrollTop = area.scrollHeight;
  });

  window.sendMsg = async () => {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text) return;
    const btn   = document.getElementById('send-btn');
    btn.disabled = true;
    input.value  = '';
    input.style.height = 'auto';
    try {
      await sendMessage(chatDocId, user.uid, text);
    } catch(e) {
      input.value = text; // restore if failed
      console.error(e);
    }
    btn.disabled = false;
    input.focus();
  };

  window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  };

  function escHtml(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
</script>
</body>
  </html>
