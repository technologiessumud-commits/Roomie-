<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List a Room • Roomie</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="page-full">
  <div style="max-width:480px;margin:0 auto;width:100%;padding-bottom:40px">

    <h2>List a room 🏡</h2>
    <p class="form-hint">Upload photos first before posting.</p>

    <!-- IMAGE UPLOAD -->
    <div class="form-group">
      <label>Room Photos</label>
      <input type="file" id="photo-input" multiple accept="image/*">

      <div class="progress-wrap">
        <div id="progress-bar"></div>
      </div>

      <p id="upload-status" class="form-hint"></p>
    </div>

    <!-- TITLE -->
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="title" placeholder="e.g. Self-contain near UNILAG">
    </div>

    <!-- PRICE -->
    <div class="form-group">
      <label>Monthly Rent (₦)</label>
      <input type="number" id="price">
    </div>

    <!-- CITY -->
    <div class="form-group">
      <label>City</label>
      <input type="text" id="city">
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label>Description</label>
      <textarea id="desc"></textarea>
    </div>

    <p id="error-msg" style="color:red;display:none"></p>

    <button id="post-btn">Post Room</button>
  </div>
</div>

<script type="module">
import { uploadImages } from './upload.js';
import { postRoom, auth, onAuth } from './firebase.js';

let selectedFiles = [];
let imageURLs = [];

onAuth(user => {
  if (!user) window.location.href = "login.html";
});

const input = document.getElementById("photo-input");
const progressBar = document.getElementById("progress-bar");
const statusEl = document.getElementById("upload-status");

input.addEventListener("change", e => {
  selectedFiles = Array.from(e.target.files);
  statusEl.textContent = `${selectedFiles.length} photos selected`;
});

document.getElementById("post-btn").onclick = async () => {
  const title = document.getElementById("title").value.trim();
  const price = document.getElementById("price").value.trim();
  const city  = document.getElementById("city").value.trim();
  const desc  = document.getElementById("desc").value.trim();
  const errEl = document.getElementById("error-msg");
  const btn   = document.getElementById("post-btn");

  errEl.style.display = "none";

  if (!title || !price || !city || !desc) {
    errEl.textContent = "Please fill all fields.";
    errEl.style.display = "block";
    return;
  }

  if (selectedFiles.length === 0) {
    errEl.textContent = "Please upload at least one photo.";
    errEl.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Uploading photos…";

  try {
    imageURLs = await uploadImages(selectedFiles, (done, total) => {
      const pct = Math.round((done / total) * 100);
      progressBar.style.width = pct + "%";
      statusEl.textContent = `Uploading ${done}/${total}…`;
    });

    btn.textContent = "Posting room…";

    const user = auth.currentUser;

    await postRoom({
      title,
      price,
      city,
      desc,
      imageURLs,
      ownerId: user.uid,
      createdAt: Date.now()
    });

    btn.textContent = "Posted! Redirecting…";
    setTimeout(()=>window.location.href="home.html",900);

  } catch (err) {
    errEl.textContent = "Upload failed. Check Cloudinary preset.";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Post Room";
  }
};
</script>
</body>
</html>
