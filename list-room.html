<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – List a Room</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .upload-box {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--card);
    }
    .upload-box:hover { border-color: var(--accent); background: rgba(255,107,53,.05); }
    .upload-box input[type="file"] { display:none; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .preview-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .preview-item .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(13,15,20,.7);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: #fff; flex-direction: column; gap: 4px;
    }
    .preview-remove {
      position: absolute; top: 5px; right: 5px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,.75); color: #fff;
      border: none; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .add-more-tile {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 2px dashed var(--border);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); font-size: 12px; gap: 4px;
      background: var(--card); transition: border-color .2s;
    }
    .add-more-tile:hover { border-color: var(--accent); color: var(--accent); }
    .progress-bar-wrap {
      height: 5px; background: var(--border); border-radius: 3px;
      margin-top: 10px; overflow: hidden; display: none;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; width: 0%; transition: width .3s;
    }
  </style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">
    <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div style="font-family:'Syne',sans-serif;font-weight:700">List a Room</div>
  <div style="width:40px"></div>
</div>

<div class="container page">

  <div class="form-group">
    <label>Room title *</label>
    <input type="text" id="title" placeholder="e.g. Cozy Self-con near UNILAG"/>
  </div>

  <div class="form-group">
    <label>Location / Address *</label>
    <input type="text" id="location" placeholder="e.g. Akoka, Lagos"/>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label>Monthly price (₦) *</label>
      <input type="number" id="price" placeholder="150000" min="0"/>
    </div>
    <div class="form-group">
      <label>Room type</label>
      <select id="type">
        <option value="self-con">Self-contain</option>
        <option value="single">Single room</option>
        <option value="shared">Shared room</option>
        <option value="flat">Flat / Apartment</option>
        <option value="studio">Studio</option>
        <option value="bq">BQ</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label>Description *</label>
    <textarea id="description" placeholder="Describe the room: size, amenities, rules, nearby landmarks…"></textarea>
  </div>

  <!-- ── PHOTO UPLOAD ── -->
  <div class="form-group">
    <label>Room Photos <span style="color:var(--muted)">(up to 6)</span></label>

    <!-- Hidden file input -->
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this.files)"/>

    <!-- Initial tap-to-upload box (hidden once photos added) -->
    <div class="upload-box" id="upload-box" onclick="document.getElementById('photo-input').click()">
      <div style="font-size:2.2rem;margin-bottom:8px">📷</div>
      <div style="font-weight:600;font-size:15px;margin-bottom:4px">Tap to add photos</div>
      <div style="color:var(--muted);font-size:13px">JPG, PNG or WEBP · up to 6 photos</div>
    </div>

    <!-- Preview grid (shown once photos selected) -->
    <div class="preview-grid" id="preview-grid" style="display:none"></div>

    <!-- Progress bar -->
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <p id="upload-status" style="font-size:13px;color:var(--muted);margin-top:6px"></p>
  </div>

  <div class="form-group">
    <label>Your WhatsApp number *</label>
    <input type="tel" id="whatsapp" placeholder="+234 800 000 0000"/>
  </div>

  <p id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px"></p>

  <button class="btn btn-primary" id="post-btn" onclick="handlePost()">🏠 Post Room</button>
</div>

<nav class="navbar">
  <a href="home.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
  </a>
  <a href="roommate.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Roommates
  </a>
  <a href="list-room.html" class="nav-item active">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Post
  </a>
  <a href="favourites.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Saved
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile
  </a>
</nav>

<div id="toast" class="toast"></div>

<script type="module">
  import { requireAuth, postRoom, getProfile } from './firebase.js';
  import { uploadImages } from './upload.js';

  const user = await requireAuth();
  let selectedFiles = [];  // { file, previewURL }

  window.handleFileSelect = function(files) {
    const remaining = 6 - selectedFiles.length;
    const toAdd = Array.from(files).filter(f => f.type.startsWith('image/')).slice(0, remaining);
    toAdd.forEach(file => {
      const previewURL = URL.createObjectURL(file);
      selectedFiles.push({ file, previewURL });
    });
    rebuildGrid();
  };

  function rebuildGrid() {
    const grid    = document.getElementById('preview-grid');
    const box     = document.getElementById('upload-box');
    const statusEl = document.getElementById('upload-status');

    if (selectedFiles.length === 0) {
      grid.style.display = 'none';
      box.style.display  = 'block';
      statusEl.textContent = '';
      return;
    }

    box.style.display  = 'none';
    grid.style.display = 'grid';

    grid.innerHTML = selectedFiles.map((item, i) => `
      <div class="preview-item" id="prev-${i}">
        <img src="${item.previewURL}" alt="photo ${i+1}"/>
        <button class="preview-remove" onclick="removePhoto(${i})">✕</button>
        ${i === 0 ? '<div style="position:absolute;bottom:5px;left:5px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px">Cover</div>' : ''}
      </div>`).join('') +
      // "Add more" tile if under 6
      (selectedFiles.length < 6
        ? `<div class="add-more-tile" onclick="document.getElementById('photo-input').click()">
             <span style="font-size:1.4rem">+</span>
             <span>Add more</span>
           </div>`
        : '');

    statusEl.textContent = `${selectedFiles.length} photo${selectedFiles.length > 1 ? 's' : ''} selected — first is cover`;
  }

  window.removePhoto = function(index) {
    URL.revokeObjectURL(selectedFiles[index].previewURL);
    selectedFiles.splice(index, 1);
    rebuildGrid();
  };

  window.handlePost = async () => {
    const title    = document.getElementById('title').value.trim();
    const location = document.getElementById('location').value.trim();
    const price    = parseFloat(document.getElementById('price').value);
    const type     = document.getElementById('type').value;
    const desc     = document.getElementById('description').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('post-btn');

    errEl.style.display = 'none';
    if (!title || !location || !price || !desc || !whatsapp) {
      errEl.textContent = 'Please fill in all required fields.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    let imageURLs = [];

    if (selectedFiles.length > 0) {
      btn.textContent = 'Uploading photos…';
      const progressWrap = document.getElementById('progress-wrap');
      const progressFill = document.getElementById('progress-fill');
      const statusEl     = document.getElementById('upload-status');
      progressWrap.style.display = 'block';
      try {
        imageURLs = await uploadImages(
          selectedFiles.map(s => s.file),
          (done, total) => {
            progressFill.style.width = Math.round((done/total)*100) + '%';
            statusEl.textContent = `Uploading photo ${done} of ${total}…`;
          }
        );
        statusEl.textContent = '✅ All photos uploaded!';
      } catch(err) {
        errEl.textContent = '⚠️ Photo upload failed. Check Cloudinary config in upload.js.';
        errEl.style.display = 'block';
        btn.textContent = '🏠 Post Room'; btn.disabled = false; return;
      }
    }

    btn.textContent = 'Posting…';
    const profile = await getProfile(user.uid);
    try {
      const ref = await postRoom({
        title, location, price, type, description: desc,
        imageURLs, whatsapp,
        ownerUid:        user.uid,
        ownerEmail:      user.email,
        ownerName:       profile?.name        || 'Anonymous',
        ownerUniversity: profile?.university  || '',
        ownerCountry:    profile?.country     || '',
        ownerCity:       profile?.city        || '',
        ownerPhotoURL:   profile?.photoURL    || '',
      });
      showToast('Room posted! 🎉', 'success');
      setTimeout(() => window.location.href = `room.html?id=${ref.id}`, 1200);
    } catch(err) {
      errEl.textContent = 'Failed to post room. Try again.';
      errEl.style.display = 'block';
      btn.textContent = '🏠 Post Room'; btn.disabled = false;
    }
  };

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
