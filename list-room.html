<!DOCTYPE html>
<html>
<head><title>List Room</title></head>
<body>

<h2>List Room</h2>

<input id="title" placeholder="Title"><br>
<input id="description" placeholder="Description"><br>

<select id="location">
  <option>Campus A</option>
  <option>Campus B</option>
</select><br>

<input id="price" type="number" placeholder="Price"><br>

<button onclick="addRoom()">Submit</button>

<script type="module">
import { auth, db, collection, addDoc } from "./firebase.js";

window.addRoom = async () => {
  await addDoc(collection(db, "rooms"), {
    title: title.value,
    description: description.value,
    location: location.value,
    price: price.value,
    owner: auth.currentUser.email
  });

  alert("Added!");
  location.href="home.html";
};
</script>

</body>
</html>
