<div class="container">

<input id="title">
<textarea id="desc"></textarea>
<input id="location">
<input id="price">

<input id="img1">
<input id="img2">
<input id="img3">

<button onclick="post()" class="primary">Post</button>

</div>

<script type="module">
import { auth, db, collection, addDoc } from "./firebase.js";

window.post = async () => {
  await addDoc(collection(db,"rooms"), {
    title:title.value,
    description:desc.value,
    location:location.value,
    price:Number(price.value),
    imageURLs:[img1.value,img2.value,img3.value].filter(Boolean),
    ownerEmail:auth.currentUser.email
  });

  location.href="home.html";
};
</script>
