<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Sign Up</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="page-full">
  <div class="auth-wrap">
    <div class="auth-logo">Room<span>ie</span></div>
    <p class="auth-subtitle">Create your free account</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@university.edu"/>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters"/>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password"/>
    </div>

    <p id="err" style="color:red;display:none"></p>

    <button id="signup-btn" onclick="emailSignUp()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

window.emailSignUp = async () => {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  showErr('');

  if (!email || !pass) {
    showErr('Fill all fields');
    return;
  }

  if (pass !== confirm) {
    showErr('Passwords do not match');
    return;
  }

  if (pass.length < 6) {
    showErr('Password must be at least 6 characters');
    return;
  }

  try {
    const { user } = await createUserWithEmailAndPassword(auth, email, pass);

    // create user doc
    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid,
      email: user.email,
      createdAt: new Date().toISOString()
    });

    location.href = 'setup.html';

  } catch(e) {
    showErr(e.message);
  }
};

function showErr(msg){
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
