<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Roomie – Sign Up</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#ff6b35"/>
  <style>
    .social-btn {
      display:flex;align-items:center;justify-content:center;gap:10px;
      width:100%;padding:13px 20px;border-radius:var(--radius-sm);
      font-size:15px;font-weight:600;font-family:'Syne',sans-serif;
      cursor:pointer;border:1.5px solid var(--border);
      background:var(--card);color:var(--text);margin-bottom:10px;
    }
    .divider-text{
      display:flex;align-items:center;gap:12px;
      color:var(--muted);font-size:13px;margin:16px 0;
    }
    .divider-text::before,.divider-text::after{
      content:'';flex:1;height:1px;background:var(--border);
    }
  </style>
</head>
<body>
<div class="page-full" style="background:radial-gradient(ellipse at 80% 10%,rgba(255,107,53,.12) 0%,transparent 55%)">
  <div class="auth-wrap">
    <div class="auth-logo">Room<span>ie</span></div>
    <p class="auth-subtitle">Create your free account</p>

    <div id="redirect-check" style="text-align:center;padding:24px 0">
      <div style="color:var(--muted);font-size:14px">⏳ Checking sign-in…</div>
    </div>

    <div id="auth-form" style="display:none">
      <button class="social-btn" id="google-btn" onclick="googleSignIn()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px;height:20px"/>
        Continue with Google
      </button>

      <div class="divider-text">or sign up with email</div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@university.edu"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters"/>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password"/>
      </div>

      <p id="err" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px;line-height:1.5"></p>

      <button class="btn btn-primary" id="signup-btn" onclick="emailSignUp()">Create Account</button>
      <div class="auth-footer">Already have an account? <a href="login.html">Log in</a></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  createUserWithEmailAndPassword, sendEmailVerification,
  GoogleAuthProvider, signInWithRedirect, getRedirectResult
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp({
  apiKey:"AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain:"roomie-f3103.firebaseapp.com",
  projectId:"roomie-f3103",
  storageBucket:"roomie-f3103.firebasestorage.app",
  messagingSenderId:"896474185176",
  appId:"1:896474185176:web:0e4543682f594daf0a86ad"
});

const auth = getAuth(app);
const db   = getFirestore(app);

let redirectHandled = false;

// ✅ HANDLE GOOGLE REDIRECT FIRST
try {
  const result = await getRedirectResult(auth);
  redirectHandled = true;

  if (result?.user) {
    const u = result.user;
    const snap = await getDoc(doc(db,'users',u.uid));

    if (!snap.exists()) {
      // 🆕 NEW USER → CREATE PROFILE → SETUP
      await setDoc(doc(db,'users',u.uid), {
        uid: u.uid,
        email: u.email || '',
        name: u.displayName || '',
        photoURL: u.photoURL || '',
        createdAt: new Date().toISOString()
      }, { merge: true });

      location.href = 'setup.html';
    } else {
      // 🔁 EXISTING USER → HOME
      location.href = 'home.html';
    }
    return;
  }
} catch(e) {
  showErr(friendly(e));
}

// ✅ AUTH STATE (ONLY AFTER REDIRECT HANDLED)
onAuthStateChanged(auth, user => {
  if (user && !redirectHandled) {
    location.href = 'home.html';
    return;
  }

  document.getElementById('redirect-check').style.display = 'none';
  document.getElementById('auth-form').style.display = 'block';
});

// 🔵 GOOGLE SIGN-IN
window.googleSignIn = async () => {
  const btn = document.getElementById('google-btn');
  btn.textContent = '⏳ Redirecting…';
  btn.disabled = true;

  await signInWithRedirect(auth, new GoogleAuthProvider());
};

// 📧 EMAIL SIGN-UP
window.emailSignUp = async () => {
  const email  = document.getElementById('email').value.trim();
  const pass   = document.getElementById('password').value;
  const confirm= document.getElementById('confirm').value;
  const btn    = document.getElementById('signup-btn');

  showErr('');

  if (!email || !pass) {
    showErr('Please fill in all fields.');
    return;
  }
  if (pass !== confirm) {
    showErr('Passwords do not match.');
    return;
  }
  if (pass.length < 6) {
    showErr('Password must be at least 6 characters.');
    return;
  }

  btn.textContent = 'Creating account…';
  btn.disabled = true;

  try {
    const { user } = await createUserWithEmailAndPassword(auth, email, pass);

    try {
      await sendEmailVerification(user, { url: location.origin + '/home.html' });
    } catch(_) {}

    location.href = 'setup.html';
  } catch(e) {
    showErr(friendly(e));
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
};

// ❗ ERROR HANDLING
function friendly(e) {
  const m = {
    'auth/email-already-in-use':  'This email is already registered. Try logging in.',
    'auth/invalid-email':         'Please enter a valid email address.',
    'auth/weak-password':         'Password too weak. Use at least 6 characters.',
    'auth/network-request-failed':'No internet connection.',
    'auth/unauthorized-domain':   '⚠️ Add ' + location.hostname + ' to Firebase → Auth → Authorized Domains.',
  };
  return m[e.code] || e.message;
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// 📦 SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
