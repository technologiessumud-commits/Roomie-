<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <title>Roomie – Sign Up</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0d0f14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
</head>
<body>

<script type="module" src="theme.js"></script>

<div class="page-full">
<div class="auth-wrap">

  <div id="state-loading" style="display:none">
    <div id="loading-text">Creating your account…</div>
  </div>

  <div id="state-form">

    <button id="google-btn" onclick="googleSignIn()">Continue with Google</button>

    <div class="method-tabs">
      <button id="tab-phone" class="method-tab active" onclick="switchTab('phone')">📱 Phone</button>
      <button id="tab-email" class="method-tab" onclick="switchTab('email')">✉️ Email</button>
    </div>

    <!-- PHONE -->
    <div id="panel-phone">
      <div id="phone-step-a">
        <input id="signup-phone" placeholder="+2348012345678"/>
        <div id="recaptcha-container-signup"></div>
        <p id="phone-err-a"></p>
        <button id="send-phone-btn" onclick="sendPhoneOTP()">Send Code</button>
      </div>

      <div id="phone-step-b" style="display:none">
        <div class="otp-row">
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'phone')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'phone')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'phone')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'phone')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'phone')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'phone')" />
        </div>
        <p id="phone-err-b"></p>
        <button id="verify-phone-btn" disabled onclick="verifyPhoneOTP()">Verify</button>
      </div>
    </div>

    <!-- EMAIL -->
    <div id="panel-email" style="display:none">
      <div id="email-step-a">
        <input id="signup-email" placeholder="you@email.com"/>
        <input id="signup-pass" type="password" placeholder="Password"/>
        <input id="signup-confirm" type="password" placeholder="Confirm"/>
        <p id="email-err-a"></p>
        <button id="send-email-btn" onclick="sendEmailCode()">Send Code</button>
      </div>

      <div id="email-step-b" style="display:none">
        <p id="email-sent-label"></p>
        <div class="otp-row">
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'email')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'email')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'email')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'email')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'email')" />
          <input class="otp-box" maxlength="1" oninput="otpIn(this,'email')" />
        </div>
        <p id="email-err-b"></p>
        <button id="verify-email-btn" disabled onclick="verifyEmailCode()">Verify</button>
      </div>
    </div>

  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  createUserWithEmailAndPassword, sendEmailVerification,
  GoogleAuthProvider, signInWithPopup,
  RecaptchaVerifier, signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDaDEbVpUUyLsmq5ilNp3CVLRs3ZX-ZWUM",
  authDomain:"roomie-f3103.firebaseapp.com",
  projectId:"roomie-f3103",
  appId:"1:896474185176:web:0e4543682f594daf0a86ad"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, u => { if (u) location.href='home.html'; });

window.switchTab = t => {
  ['phone','email'].forEach(x=>{
    document.getElementById(`panel-${x}`).style.display = x===t?'block':'none';
    document.getElementById(`tab-${x}`).classList.toggle('active',x===t);
  });
};

window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container-signup',{size:'invisible'});

let phoneConfirmation;
window.sendPhoneOTP = async ()=>{
  phoneConfirmation = await signInWithPhoneNumber(
    auth,
    signup-phone.value,
    window.recaptchaVerifier
  );
  phone-step-a.style.display='none';
  phone-step-b.style.display='block';
};

window.verifyPhoneOTP = async ()=>{
  const otp = getOTP('panel-phone');
  const {user} = await phoneConfirmation.confirm(otp);
  await afterSignup(user,{phoneVerified:true});
};

let emailOTP, pendingEmailUser;
window.sendEmailCode = async ()=>{
  const {user} = await createUserWithEmailAndPassword(
    auth,
    signup-email.value,
    signup-pass.value
  );
  pendingEmailUser = user;
  emailOTP = Math.floor(100000+Math.random()*900000).toString();
  await sendEmailVerification(user);
  email-step-a.style.display='none';
  email-step-b.style.display='block';
  email-sent-label.textContent = signup-email.value;
};

window.verifyEmailCode = async ()=>{
  if(getOTP('panel-email')!==emailOTP){
    email-err-b.textContent='Wrong code';
    return;
  }
  await afterSignup(pendingEmailUser,{emailVerified:true});
};

window.otpIn = (el,type)=>{
  el.value=el.value.replace(/\D/g,'');
  const boxes=[...el.parentNode.children];
  if(el.value && boxes[boxes.indexOf(el)+1]) boxes[boxes.indexOf(el)+1].focus();
  const filled = boxes.every(b=>b.value);
  document.getElementById(type==='phone'?'verify-phone-btn':'verify-email-btn').disabled=!filled;
};

window.getOTP = panel =>
  [...document.querySelectorAll(`#${panel} .otp-box`)].map(b=>b.value).join('');

async function afterSignup(user,extra){
  await setDoc(doc(db,'users',user.uid),{
    uid:user.uid,
    email:user.email||'',
    createdAt:new Date().toISOString(),
    ...extra
  },{merge:true});
  location.href='setup.html';
}
</script>
</body>
          </html>
