<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-full" style="background:radial-gradient(ellipse at 80% 10%,rgba(255,107,53,.12) 0%,transparent 55%)">
    <div class="auth-wrap">

      <div class="auth-logo">Room<span>ie</span></div>
      <p class="auth-subtitle">Create your account to get started</p>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@university.edu" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" />
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password" />
      </div>

      <p id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px;border:1px solid rgba(255,77,109,.2);line-height:1.5"></p>

      <button class="btn btn-primary" id="signup-btn" onclick="handleSignup()">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { signUp } from './firebase.js';

    window.handleSignup = async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('signup-btn');

      errEl.style.display = 'none';

      function showError(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }

      if (!email || !password) { showError('Please fill in all fields.'); return; }
      if (password !== confirm) { showError('Passwords do not match.'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        await signUp(email, password);
        window.location.href = 'setup.html';
      } catch (err) {
        console.error('Signup error:', err);
        const code = err.code || '';
        const messages = {
          'auth/unauthorized-domain':    '⚠️ Domain not authorized. Go to Firebase Console → Authentication → Settings → Authorized Domains and add: ' + location.hostname,
          'auth/operation-not-allowed':  '⚠️ Email/Password sign-in is not enabled. Go to Firebase Console → Authentication → Sign-in method and enable it.',
          'auth/email-already-in-use':   'This email is already registered. Try logging in instead.',
          'auth/invalid-email':          'Please enter a valid email address.',
          'auth/weak-password':          'Password is too weak. Use at least 6 characters.',
          'auth/network-request-failed': 'Network error. Check your internet connection and try again.',
          'auth/too-many-requests':      'Too many attempts. Please wait a moment and try again.',
          'auth/invalid-api-key':        '⚠️ Invalid API key. Check your Firebase config in firebase.js.',
        };
        showError(messages[code] || 'Error [' + code + ']: ' + err.message);
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
