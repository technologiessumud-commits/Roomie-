<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-full" style="background:radial-gradient(ellipse at 80% 10%,rgba(255,107,53,.12) 0%,transparent 55%)">
    <div class="auth-wrap">

      <div class="auth-logo">Room<span>ie</span></div>
      <p class="auth-subtitle">Create your account to get started</p>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@university.edu" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" />
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat password" />
      </div>

      <p id="error-msg" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></p>

      <button class="btn btn-primary" id="signup-btn" onclick="handleSignup()">
        Create Account
      </button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { signUp } from './firebase.js';

    window.handleSignup = async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errEl    = document.getElementById('error-msg');
      const btn      = document.getElementById('signup-btn');

      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields.';
        errEl.style.display = 'block'; return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block'; return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block'; return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        await signUp(email, password);
        window.location.href = 'setup.html';
      } catch (err) {
        errEl.textContent = err.message.replace('Firebase: ', '').replace(/\(.*\)\.?/, '');
        errEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
