<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Roommate Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div style="height:260px" class="skeleton"></div>
    <div class="skeleton skeleton-text" style="margin:20px 20px 8px;height:24px"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <!-- Content -->
  <div id="content" style="display:none;padding-bottom:120px">

    <!-- Back button -->
    <div style="position:absolute;top:16px;left:16px;z-index:10">
      <button class="back-btn" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <!-- Profile photo / banner -->
    <div id="photo-section" style="position:relative;height:240px;background:var(--card);overflow:hidden">
      <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg) 100%)"></div>
    </div>

    <!-- Profile info -->
    <div style="padding:0 20px;margin-top:-40px;position:relative">
      <div id="avatar-large" class="avatar avatar-lg" style="border:3px solid var(--bg)">?</div>
      <div style="margin-top:12px">
        <h2 id="rm-name" style="font-size:1.4rem">—</h2>
        <div id="rm-university" style="color:var(--muted);font-size:14px;margin-top:2px"></div>
        <div id="rm-location" style="color:var(--muted);font-size:13px;margin-top:4px"></div>
      </div>

      <!-- Type badge -->
      <div style="margin-top:12px" id="rm-badge"></div>

      <!-- Status banner -->
      <div id="rm-status-banner" style="display:none;align-items:center;gap:10px;padding:12px 16px;background:rgba(62,207,142,.12);color:var(--success);border-radius:var(--radius-sm);margin-top:12px;font-weight:600;font-size:14px">
        ✅ Roommate has been found
      </div>

      <!-- Owner controls -->
      <div id="rm-owner-controls" style="display:none;flex-direction:column;gap:10px;margin-top:16px">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px">Manage Listing</div>
        <button class="btn btn-secondary" id="rm-status-btn" onclick="toggleRoommateStatus()">✅ Mark Roommate as Found</button>
        <button class="btn" onclick="deleteRoomateListing()" style="background:transparent;color:var(--danger);border:1.5px solid var(--danger);display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:var(--radius-sm);font-family:'Syne',sans-serif;font-weight:600;cursor:pointer">🗑️ Delete Listing</button>
      </div>

      <!-- Same uni badge -->
      <div id="same-uni-badge" style="display:none;margin-top:8px">
        <span class="card-tag">🎓 Same University as you</span>
      </div>

      <div class="divider"></div>

      <!-- About -->
      <h3 style="font-family:'Syne',sans-serif;margin-bottom:10px">About</h3>
      <p id="rm-desc" style="color:var(--muted);font-size:14px;line-height:1.7">—</p>

      <div class="divider"></div>

      <!-- Their room listings -->
      <h3 style="font-family:'Syne',sans-serif;margin-bottom:12px">Their Room Listings</h3>
      <div id="rm-rooms" style="display:flex;flex-direction:column;gap:12px"></div>
      <div id="rm-rooms-empty" style="display:none;color:var(--muted);font-size:14px;padding:8px 0">
        No rooms posted yet.
      </div>
    </div>
  </div>

  <!-- Action bar -->
  <div id="action-bar" style="position:fixed;bottom:0;left:0;right:0;padding:16px 20px;background:var(--bg);border-top:1px solid var(--border);display:none">
    <button class="btn btn-whatsapp" id="wa-btn">💬 Chat on WhatsApp</button>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, getRoommates, getUserRooms, getProfile, updateRoommate, deleteRoommate } from './firebase.js';

    const user = await requireAuth();
    const userProfile = await getProfile(user.uid);
    const params = new URLSearchParams(location.search);
    const listingId = params.get('id');

    if (!listingId) { window.location.href = 'roommate.html'; }

    // Get all roommate listings and find the one with this id
    const all = await getRoommates();
    const listing = all.find(l => l.id === listingId);

    if (!listing) {
      showToast('Listing not found', 'error');
      setTimeout(() => window.location.href = 'roommate.html', 1500);
    } else {
      // Also fetch their room listings
      const theirRooms = listing.uid ? await getUserRooms(listing.uid) : [];
      renderListing(listing, theirRooms);
    }

    function renderListing(item, rooms) {
      // Photo section
      const photoSection = document.getElementById('photo-section');
      if (item.ownerPhotoURL) {
        const img = document.createElement('img');
        img.src = item.ownerPhotoURL;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;inset:0';
        img.onerror = () => { img.remove(); showDefaultBanner(photoSection, item); };
        photoSection.prepend(img);
      } else {
        showDefaultBanner(photoSection, item);
      }

      // Avatar
      const initial = (item.ownerName || 'U')[0].toUpperCase();
      const avatarEl = document.getElementById('avatar-large');
      if (item.ownerPhotoURL) {
        avatarEl.outerHTML = `<img src="${item.ownerPhotoURL}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--bg)" onerror="this.outerHTML='<div class=avatar avatar-lg style=border:3px solid var(--bg)>${initial}</div>'" />`;
      } else {
        avatarEl.textContent = initial;
      }

      // Text info
      document.getElementById('rm-name').textContent = item.ownerName || 'Anonymous';
      document.getElementById('rm-university').textContent = item.ownerUniversity ? '🎓 ' + item.ownerUniversity : '';
      document.getElementById('rm-location').textContent = item.location ? '📍 ' + item.location : '';
      document.getElementById('rm-desc').textContent = item.description || 'No description provided.';

      // Badge
      const isNeed = item.type === 'need';
      document.getElementById('rm-badge').innerHTML =
        `<span class="card-tag ${isNeed ? 'need' : ''}">${isNeed ? '🔍 Looking for a Room' : '🏠 Has a Room Available'}</span>`;

      // Owner controls
      if (user.uid === item.uid) {
        const ctrl = document.getElementById('rm-owner-controls');
        ctrl.style.display = 'flex';
        if (item.status === 'found') {
          document.getElementById('rm-status-btn').textContent = '🔄 Mark as Still Looking';
          document.getElementById('rm-status-banner').style.display = 'flex';
        }
      }

      // Same uni
      if (userProfile && item.ownerUniversity &&
          item.ownerUniversity.toLowerCase() === userProfile.university.toLowerCase()) {
        document.getElementById('same-uni-badge').style.display = 'block';
      }

      // Room listings
      const roomsEl = document.getElementById('rm-rooms');
      const roomsEmpty = document.getElementById('rm-rooms-empty');
      if (rooms.length === 0) {
        roomsEmpty.style.display = 'block';
      } else {
        roomsEl.innerHTML = rooms.map(r => {
          const img = r.imageURLs && r.imageURLs.length > 0
            ? `<img src="${r.imageURLs[0]}" style="width:72px;height:72px;object-fit:cover;border-radius:10px;flex-shrink:0" onerror="this.style.display='none'" />`
            : `<div style="width:72px;height:72px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">🏠</div>`;
          return `
            <div class="card" onclick="window.location.href='room.html?id=${r.id}'" style="cursor:pointer">
              <div class="card-body" style="display:flex;gap:14px;align-items:center">
                ${img}
                <div style="flex:1;min-width:0">
                  <div style="font-weight:600;font-size:14px">${escHtml(r.title)}</div>
                  <div style="font-size:12px;color:var(--muted)">📍 ${escHtml(r.location || '—')}</div>
                  <div style="margin-top:4px"><span class="card-price" style="font-size:14px">₦${Number(r.price).toLocaleString()}/mo</span></div>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--muted)" fill="none" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>`;
        }).join('');
      }

      // WhatsApp button
      const waBtn = document.getElementById('wa-btn');
      if (item.whatsapp) {
        const clean = item.whatsapp.replace(/\D/g, '');
        const msg = encodeURIComponent(`Hi ${item.ownerName || ''}! I saw your roommate listing on Roomie and I'm interested.`);
        waBtn.onclick = () => window.open(`https://wa.me/${clean}?text=${msg}`, '_blank');
      } else {
        waBtn.textContent = '📧 Send Email';
        waBtn.onclick = () => window.open(`mailto:${item.email}`, '_blank');
      }

      // Show everything
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
      document.getElementById('action-bar').style.display = 'block';
    }

    window.toggleRoommateStatus = async () => {
      const newStatus = listing.status === 'found' ? 'active' : 'found';
      try {
        await updateRoommate(listingId, { status: newStatus });
        listing.status = newStatus;
        const btn = document.getElementById('rm-status-btn');
        const banner = document.getElementById('rm-status-banner');
        if (newStatus === 'found') {
          btn.textContent = '🔄 Mark as Still Looking';
          banner.style.display = 'flex';
        } else {
          btn.textContent = '✅ Mark Roommate as Found';
          banner.style.display = 'none';
        }
        showToast(newStatus==='found'?'✅ Marked as found!':'🔄 Back to active','success');
      } catch(e) { showToast('Failed to update','error'); }
    };

    window.deleteRoomateListing = async () => {
      if (!confirm('Delete this listing?')) return;
      try {
        await deleteRoommate(listingId);
        showToast('Listing deleted','success');
        setTimeout(()=>window.location.href='roommate.html',1200);
      } catch(e) { showToast('Failed to delete','error'); }
    };

    function showDefaultBanner(el, item) {
      const isNeed = item.type === 'need';
      el.style.background = isNeed
        ? 'linear-gradient(135deg,rgba(255,77,109,.3),rgba(13,15,20,1))'
        : 'linear-gradient(135deg,rgba(255,107,53,.3),rgba(13,15,20,1))';
    }

    function escHtml(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
