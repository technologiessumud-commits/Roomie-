<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#ff6b35"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Roomie – Roommates</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">Room<span>ie</span></div>
    <button onclick="togglePostForm()" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer">
      + Post
    </button>
  </div>

  <!-- POST FORM -->
  <div id="post-form" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:20px">
    <h3 style="font-family:'Syne',sans-serif;margin-bottom:16px">Post Roommate Listing</h3>
    <div class="form-group">
      <label>I am…</label>
      <select id="rm-type">
        <option value="need">Looking for a room (Need a place)</option>
        <option value="have">Have a room (Looking for roommate)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Location / Area *</label>
      <input type="text" id="rm-location" placeholder="e.g. Near UNILAG, Akoka" />
    </div>
    <div class="form-group">
      <label>Description *</label>
      <textarea id="rm-desc" rows="3" placeholder="Tell others about yourself, schedule, preferences…"></textarea>
    </div>
    <div class="form-group">
      <label>Budget / Rent range <span style="color:var(--muted)">(optional)</span></label>
      <div style="display:flex;gap:8px">
        <select id="rm-currency" style="width:auto;flex-shrink:0;min-width:110px;padding-right:32px">
          <option value="NGN" data-symbol="₦">₦ NGN</option>
          <option value="USD" data-symbol="$">$ USD</option>
          <option value="GBP" data-symbol="£">£ GBP</option>
          <option value="EUR" data-symbol="€">€ EUR</option>
          <option value="GHS" data-symbol="₵">₵ GHS</option>
          <option value="KES" data-symbol="KSh">KSh KES</option>
          <option value="ZAR" data-symbol="R">R ZAR</option>
          <option value="CAD" data-symbol="C$">C$ CAD</option>
          <option value="AUD" data-symbol="A$">A$ AUD</option>
          <option value="INR" data-symbol="₹">₹ INR</option>
          <option value="XOF" data-symbol="CFA">CFA XOF</option>
          <option value="EGP" data-symbol="E£">E£ EGP</option>
          <option value="TZS" data-symbol="TSh">TSh TZS</option>
          <option value="UGX" data-symbol="USh">USh UGX</option>
          <option value="ETB" data-symbol="Br">Br ETB</option>
          <option value="AED" data-symbol="AED">AED</option>
          <option value="MYR" data-symbol="RM">RM MYR</option>
          <option value="BRL" data-symbol="R$">R$ BRL</option>
        </select>
        <input type="number" id="rm-budget" placeholder="Max budget per month" min="0" style="flex:1"/>
      </div>
    </div>
    <div class="form-group">
      <label>WhatsApp number *</label>
      <input type="tel" id="rm-whatsapp" placeholder="+234 800 000 0000" />
    </div>
    <p id="rm-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px"></p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="rm-submit-btn" onclick="handlePostRoommate()">Post Listing</button>
      <button class="btn btn-secondary" onclick="togglePostForm()" style="width:auto;padding:14px 20px">Cancel</button>
    </div>
  </div>

  <!-- SCOPE FILTER CHIPS -->
  <div class="filter-row" style="padding-top:12px">
    <button class="filter-chip active" id="scope-uni"     onclick="setScopeFilter('uni',this)">🎓 My University</button>
    <button class="filter-chip"        id="scope-country" onclick="setScopeFilter('country',this)">🌍 My Country</button>
    <button class="filter-chip"        id="scope-all"     onclick="setScopeFilter('all',this)">🌐 All Schools</button>
  </div>

  <!-- TYPE TABS -->
  <div style="display:flex;border-bottom:1px solid var(--border)">
    <button id="tab-all"  onclick="setTab('all')"  style="flex:1;padding:14px;background:none;border:none;color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid var(--accent);cursor:pointer">All</button>
    <button id="tab-need" onclick="setTab('need')" style="flex:1;padding:14px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid transparent;cursor:pointer">Need Room</button>
    <button id="tab-have" onclick="setTab('have')" style="flex:1;padding:14px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid transparent;cursor:pointer">Have Room</button>
  </div>

  <!-- COUNT -->
  <div style="padding:12px 20px 0;font-size:13px;color:var(--muted)" id="rm-count"></div>

  <!-- LOADING -->
  <div id="rm-skeleton" style="padding:20px;display:flex;flex-direction:column;gap:12px">
    <div class="skeleton" style="height:120px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:120px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:120px;border-radius:var(--radius)"></div>
  </div>

  <div id="rm-container" style="padding:12px 20px;display:none;flex-direction:column;gap:12px;padding-bottom:120px"></div>

  <div id="rm-empty" class="empty-state" style="display:none">
    <div class="empty-icon">👥</div>
    <div class="empty-title" id="rm-empty-title">No listings at your university yet</div>
    <p class="empty-sub" id="rm-empty-sub">Be the first to post, or switch to "My Country" or "All Schools"</p>
  </div>

  <nav class="navbar">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="roommate.html" class="nav-item active">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Roommates
    </a>
    <a href="list-room.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Post
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, postRoommate, getRoommates, getProfile } from './firebase.js';

    const user = await requireAuth();
    const userProfile = await getProfile(user.uid);

    let allListings  = [];
    let currentTab   = 'all';
    let scopeFilter  = 'uni';   // default: same university

    // Label chips with real uni/country names
    if (userProfile) {
      const uniShort = userProfile.university.length > 18
        ? userProfile.university.split(' ').slice(0,3).join(' ') + '…'
        : userProfile.university;
      document.getElementById('scope-uni').textContent     = `🎓 ${uniShort}`;
      document.getElementById('scope-country').textContent =
        `🌍 ${userProfile.countryDisplay || capitalize(userProfile.country)}`;
    }

    async function loadRoommates() {
      try {
        allListings = await getRoommates();
        document.getElementById('rm-skeleton').style.display = 'none';
        document.getElementById('rm-container').style.display = 'flex';
        applyFilters();
      } catch (err) {
        showToast('Failed to load listings', 'error');
      }
    }

    function applyFilters() {
      let filtered = allListings;

      // ── Scope filter ──────────────────────────────────────────
      if (scopeFilter === 'uni' && userProfile) {
        filtered = filtered.filter(l =>
          l.ownerUniversity &&
          l.ownerUniversity.toLowerCase() === userProfile.university.toLowerCase()
        );
      } else if (scopeFilter === 'country' && userProfile) {
        filtered = filtered.filter(l =>
          l.ownerCountry &&
          l.ownerCountry.toLowerCase() === userProfile.country.toLowerCase()
        );
      }

      // ── Tab filter ────────────────────────────────────────────
      if (currentTab !== 'all') {
        filtered = filtered.filter(l => l.type === currentTab);
      }

      // ── Sort: same uni always first when in country/all view ──
      if (userProfile && scopeFilter !== 'uni') {
        filtered.sort((a, b) => {
          const aMatch = (a.ownerUniversity || '').toLowerCase() === userProfile.university.toLowerCase();
          const bMatch = (b.ownerUniversity || '').toLowerCase() === userProfile.university.toLowerCase();
          return bMatch - aMatch;
        });
      }

      document.getElementById('rm-count').textContent =
        `${filtered.length} listing${filtered.length !== 1 ? 's' : ''}`;

      renderListings(filtered);
    }

    function renderListings(list) {
      // user is available from outer scope
      const container = document.getElementById('rm-container');
      const empty     = document.getElementById('rm-empty');

      if (list.length === 0) {
        container.style.display = 'none';
        empty.style.display = 'flex';

        if (scopeFilter === 'uni') {
          document.getElementById('rm-empty-title').textContent = 'No listings at your university yet';
          document.getElementById('rm-empty-sub').textContent =
            'Be the first to post, or switch to "My Country" or "All Schools" to see more.';
        } else if (scopeFilter === 'country') {
          document.getElementById('rm-empty-title').textContent = 'No listings in your country yet';
          document.getElementById('rm-empty-sub').textContent = 'Switch to "All Schools" to see everyone.';
        } else {
          document.getElementById('rm-empty-title').textContent = 'No listings found';
          document.getElementById('rm-empty-sub').textContent = 'Be the first to post!';
        }
        return;
      }

      container.style.display = 'flex';
      empty.style.display = 'none';

      container.innerHTML = list.map(item => {
        const isNeed  = item.type === 'need';
        const sameUni = userProfile && item.ownerUniversity &&
          item.ownerUniversity.toLowerCase() === userProfile.university.toLowerCase();
        const initial = (item.ownerName || 'U')[0].toUpperCase();
        const photo   = item.ownerPhotoURL;

        const avatarHtml = photo
          ? `<img src="${photo}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0"
               onerror="this.outerHTML='<div class=avatar style=width:48px;height:48px;font-size:.9rem>${initial}</div>'" />`
          : `<div class="avatar" style="width:48px;height:48px;font-size:.9rem">${initial}</div>`;

        // Show university on card only when NOT in uni-only view
        const uniLine = (scopeFilter !== 'uni' && item.ownerUniversity)
          ? `<div style="font-size:12px;color:var(--muted)">🎓 ${escHtml(item.ownerUniversity)}</div>` : '';

        return `
          <div class="card" onclick="window.location.href='roommate-detail.html?id=${item.id}'" style="cursor:pointer">
            <div class="card-body">
              <div style="display:flex;align-items:flex-start;gap:12px">
                ${avatarHtml}
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                    <span class="card-tag ${isNeed ? 'need' : ''}">${isNeed ? '🔍 Need Room' : '🏠 Have Room'}</span>
                    ${sameUni && scopeFilter !== 'uni' ? '<span class="card-tag" style="background:rgba(255,107,53,.12);color:var(--accent)">Your Uni</span>' : ''}
                  </div>
                  <div style="font-weight:600;font-size:14px;margin-top:6px">${escHtml(item.ownerName || 'Anonymous')}</div>
                  ${uniLine}
                  <div style="font-size:12px;color:var(--muted);margin-top:2px">📍 ${escHtml(item.location || 'Location not specified')}</div>
                  ${item.budget ? `<div style="font-size:12px;color:var(--success);margin-top:2px">💰 Budget: ${item.currencySymbol||''}${Number(item.budget).toLocaleString()}/${item.currency||''}</div>` : ''}
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--muted)" fill="none" stroke-width="2" style="flex-shrink:0;margin-top:4px"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <p style="font-size:13px;color:var(--muted);margin-top:10px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escHtml(item.description || '')}</p>
            </div>
          </div>`;
      }).join('');
    }

    window.setTab = function(tab) {
      currentTab = tab;
      ['all','need','have'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        btn.style.color        = t === tab ? 'var(--text)' : 'var(--muted)';
        btn.style.borderBottom = t === tab ? '2px solid var(--accent)' : '2px solid transparent';
      });
      applyFilters();
    };

    window.setScopeFilter = function(scope, el) {
      scopeFilter = scope;
      ['scope-uni','scope-country','scope-all'].forEach(id =>
        document.getElementById(id).classList.remove('active')
      );
      el.classList.add('active');
      applyFilters();
    };

    window.togglePostForm = function() {
      const form = document.getElementById('post-form');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };

    window.handlePostRoommate = async () => {
      const type     = document.getElementById('rm-type').value;
      const location = document.getElementById('rm-location').value.trim();
      const desc     = document.getElementById('rm-desc').value.trim();
      const whatsapp = document.getElementById('rm-whatsapp').value.trim();
      const errEl    = document.getElementById('rm-error');
      const btn      = document.getElementById('rm-submit-btn');

      errEl.style.display = 'none';
      if (!location || !desc || !whatsapp) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.style.display = 'block'; return;
      }

      btn.textContent = 'Posting…'; btn.disabled = true;

      try {
        await postRoommate({
          type, location, description: desc, whatsapp,
          budget:   document.getElementById('rm-budget').value || '',
          currency: document.getElementById('rm-currency').value,
          currencySymbol: document.getElementById('rm-currency').options[document.getElementById('rm-currency').selectedIndex]?.dataset?.symbol || '',
          uid:             user.uid,
          email:           user.email,
          ownerName:       userProfile ? userProfile.name : '',
          ownerUniversity: userProfile ? userProfile.university : '',
          ownerCountry:    userProfile ? userProfile.country : '',
          ownerCity:       userProfile ? userProfile.city : '',
          ownerPhotoURL:   userProfile ? (userProfile.photoURL || '') : '',
        });
        showToast('Listing posted! 🎉', 'success');
        togglePostForm();
        allListings = await getRoommates();
        applyFilters();
      } catch (err) {
        errEl.textContent = 'Failed to post listing.';
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Post Listing'; btn.disabled = false;
      }
    };

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    function escHtml(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadRoommates();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
</html>
