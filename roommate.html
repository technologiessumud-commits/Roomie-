<div class="container">

<select id="type">
  <option value="need">Need roommate</option>
  <option value="have">Have room</option>
</select>

<input id="desc">
<input id="loc">
<input id="wa">

<button onclick="post()" class="primary">Post</button>

<div id="list"></div>

</div>

<script type="module">
import { auth, db, collection, addDoc, getDocs } from "./firebase.js";

window.post = async () => {
  await addDoc(collection(db,"roommates"), {
    type:type.value,
    description:desc.value,
    location:loc.value,
    whatsapp:wa.value,
    email:auth.currentUser.email
  });

  load();
};

async function load(){
  const snap = await getDocs(collection(db,"roommates"));

  list.innerHTML="";
  snap.forEach(d=>{
    const r=d.data();
    list.innerHTML+=`
      <div class="card">
        <h3>${r.type}</h3>
        <p>${r.description}</p>
        <a href="https://wa.me/${r.whatsapp}">
          <button class="primary">Chat</button>
        </a>
      </div>
    `;
  });
}

load();
</script>
