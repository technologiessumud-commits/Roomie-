<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Roommates</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">Room<span>ie</span></div>
    <button id="post-toggle-btn" onclick="togglePostForm()" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer">
      + Post
    </button>
  </div>

  <!-- POST FORM -->
  <div id="post-form" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:20px">
    <h3 style="font-family:'Syne',sans-serif;margin-bottom:16px">Post Roommate Listing</h3>
    <div class="form-group">
      <label>I am…</label>
      <select id="rm-type">
        <option value="need">Looking for a room (Need a place)</option>
        <option value="have">Have a room (Looking for roommate)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Location / Area *</label>
      <input type="text" id="rm-location" placeholder="e.g. Near UNILAG, Akoka" />
    </div>
    <div class="form-group">
      <label>Description *</label>
      <textarea id="rm-desc" rows="3" placeholder="Tell others about yourself, your schedule, preferences…"></textarea>
    </div>
    <div class="form-group">
      <label>WhatsApp number *</label>
      <input type="tel" id="rm-whatsapp" placeholder="+234 800 000 0000" />
    </div>
    <p id="rm-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:rgba(255,77,109,.08);padding:10px 14px;border-radius:8px"></p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="rm-submit-btn" onclick="handlePostRoommate()">Post Listing</button>
      <button class="btn btn-secondary" onclick="togglePostForm()" style="width:auto;padding:14px 20px">Cancel</button>
    </div>
  </div>

  <!-- SCOPE + TAB FILTERS -->
  <div style="padding:12px 20px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none">
    <button class="filter-chip active" id="scope-country" onclick="setScopeFilter('country',this)">🏫 My Country</button>
    <button class="filter-chip" id="scope-all" onclick="setScopeFilter('all',this)">🌍 All</button>
  </div>

  <div style="display:flex;border-bottom:1px solid var(--border);margin-top:8px">
    <button id="tab-all"  onclick="setTab('all')"  style="flex:1;padding:14px;background:none;border:none;color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid var(--accent);cursor:pointer">All</button>
    <button id="tab-need" onclick="setTab('need')" style="flex:1;padding:14px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid transparent;cursor:pointer">Need Room</button>
    <button id="tab-have" onclick="setTab('have')" style="flex:1;padding:14px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid transparent;cursor:pointer">Have Room</button>
  </div>

  <!-- LOADING -->
  <div id="rm-skeleton" style="padding:20px;display:flex;flex-direction:column;gap:12px">
    <div class="skeleton" style="height:130px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:130px;border-radius:var(--radius)"></div>
    <div class="skeleton" style="height:130px;border-radius:var(--radius)"></div>
  </div>

  <div id="rm-container" style="padding:16px 20px;display:none;flex-direction:column;gap:12px;padding-bottom:120px"></div>

  <div id="rm-empty" class="empty-state" style="display:none">
    <div class="empty-icon">👥</div>
    <div class="empty-title">No listings in your country yet</div>
    <p class="empty-sub">Switch to "All" to see everyone, or be the first to post!</p>
  </div>

  <nav class="navbar">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="roommate.html" class="nav-item active">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Roommates
    </a>
    <a href="list-room.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Post
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, postRoommate, getRoommates, getProfile } from './firebase.js';

    const user = await requireAuth();
    const userProfile = await getProfile(user.uid);

    let allListings = [];
    let currentTab = 'all';
    let scopeFilter = 'country';

    // Update scope chip label
    if (userProfile && userProfile.country) {
      document.getElementById('scope-country').textContent =
        '🏫 ' + userProfile.country.charAt(0).toUpperCase() + userProfile.country.slice(1);
    }

    async function loadRoommates() {
      try {
        allListings = await getRoommates();
        document.getElementById('rm-skeleton').style.display = 'none';
        document.getElementById('rm-container').style.display = 'flex';
        applyFilters();
      } catch (err) {
        showToast('Failed to load listings', 'error');
      }
    }

    function applyFilters() {
      let filtered = allListings;

      // Scope filter
      if (scopeFilter === 'country' && userProfile && userProfile.country) {
        filtered = filtered.filter(l =>
          l.ownerCountry && l.ownerCountry.toLowerCase() === userProfile.country.toLowerCase()
        );
      }

      // Tab filter
      if (currentTab !== 'all') {
        filtered = filtered.filter(l => l.type === currentTab);
      }

      // Sort: same university first
      if (userProfile) {
        filtered.sort((a, b) => {
          const aMatch = (a.ownerUniversity || '').toLowerCase() === (userProfile.university || '').toLowerCase();
          const bMatch = (b.ownerUniversity || '').toLowerCase() === (userProfile.university || '').toLowerCase();
          return bMatch - aMatch;
        });
      }

      renderListings(filtered);
    }

    function renderListings(list) {
      const container = document.getElementById('rm-container');
      const empty     = document.getElementById('rm-empty');

      if (list.length === 0) {
        container.style.display = 'none';
        empty.style.display = 'flex';
        return;
      }
      container.style.display = 'flex';
      empty.style.display = 'none';

      container.innerHTML = list.map(item => {
        const isNeed   = item.type === 'need';
        const sameUni  = userProfile && item.ownerUniversity &&
          item.ownerUniversity.toLowerCase() === userProfile.university.toLowerCase();
        const photo    = item.ownerPhotoURL;
        const initial  = (item.ownerName || item.email || 'U')[0].toUpperCase();

        const avatarHtml = photo
          ? `<img src="${photo}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.outerHTML='<div class=avatar style=width:48px;height:48px;font-size:.9rem>${initial}</div>'" />`
          : `<div class="avatar" style="width:48px;height:48px;font-size:.9rem">${initial}</div>`;

        return `
          <div class="card" onclick="window.location.href='roommate-detail.html?id=${item.id}'" style="cursor:pointer">
            <div class="card-body">
              <div style="display:flex;align-items:flex-start;gap:12px">
                ${avatarHtml}
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <span class="card-tag ${isNeed ? 'need' : ''}">${isNeed ? '🔍 Need Room' : '🏠 Have Room'}</span>
                    ${sameUni ? '<span class="card-tag" style="background:rgba(255,107,53,.12);color:var(--accent)">🎓 Same Uni</span>' : ''}
                  </div>
                  <div style="font-weight:600;font-size:14px;margin-top:6px">${escHtml(item.ownerName || 'Anonymous')}</div>
                  <div style="font-size:12px;color:var(--muted)">${escHtml(item.ownerUniversity || '')}</div>
                  <div style="font-size:12px;color:var(--muted);margin-top:2px">📍 ${escHtml(item.location || 'Location not specified')}</div>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--muted)" fill="none" stroke-width="2" style="flex-shrink:0;margin-top:4px"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <p style="font-size:13px;color:var(--muted);margin-top:10px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escHtml(item.description || '')}</p>
            </div>
          </div>`;
      }).join('');
    }

    window.setTab = function(tab) {
      currentTab = tab;
      ['all','need','have'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        btn.style.color       = t === tab ? 'var(--text)' : 'var(--muted)';
        btn.style.borderBottom = t === tab ? '2px solid var(--accent)' : '2px solid transparent';
      });
      applyFilters();
    };

    window.setScopeFilter = function(scope, el) {
      scopeFilter = scope;
      document.getElementById('scope-country').classList.toggle('active', scope === 'country');
      document.getElementById('scope-all').classList.toggle('active', scope === 'all');
      applyFilters();
    };

    window.togglePostForm = function() {
      const form = document.getElementById('post-form');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };

    window.handlePostRoommate = async () => {
      const type     = document.getElementById('rm-type').value;
      const location = document.getElementById('rm-location').value.trim();
      const desc     = document.getElementById('rm-desc').value.trim();
      const whatsapp = document.getElementById('rm-whatsapp').value.trim();
      const errEl    = document.getElementById('rm-error');
      const btn      = document.getElementById('rm-submit-btn');

      errEl.style.display = 'none';
      if (!location || !desc || !whatsapp) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.style.display = 'block'; return;
      }

      btn.textContent = 'Posting…';
      btn.disabled = true;

      try {
        await postRoommate({
          type, location, description: desc, whatsapp,
          uid:             user.uid,
          email:           user.email,
          ownerName:       userProfile ? userProfile.name : '',
          ownerUniversity: userProfile ? userProfile.university : '',
          ownerCountry:    userProfile ? userProfile.country : '',
          ownerCity:       userProfile ? userProfile.city : '',
          ownerPhotoURL:   userProfile ? (userProfile.photoURL || '') : '',
        });
        showToast('Listing posted! 🎉', 'success');
        togglePostForm();
        allListings = await getRoommates();
        applyFilters();
      } catch (err) {
        errEl.textContent = 'Failed to post listing.';
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Post Listing';
        btn.disabled = false;
      }
    };

    function escHtml(str) {
      const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadRoommates();
  </script>
</body>
</html>
