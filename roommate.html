<!DOCTYPE html>
<html>
<head>
  <title>Roommates</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>Roommate System</h2>

  <select id="type">
    <option value="need">Need roommate</option>
    <option value="have">Have room</option>
  </select>

  <input id="description" placeholder="Description">
  <input id="location" placeholder="Location">
  <input id="whatsapp" placeholder="WhatsApp">

  <button class="primary" onclick="post()">Post</button>

  <div id="list"></div>

</div>

<script type="module">
import { auth, db, collection, addDoc, getDocs } from "./firebase.js";

window.post = async () => {
  await addDoc(collection(db, "roommates"), {
    type: type.value,
    description: description.value,
    location: location.value,
    whatsapp: whatsapp.value,
    email: auth.currentUser.email
  });

  load();
};

async function load() {
  const snap = await getDocs(collection(db, "roommates"));

  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(d => {
    const r = d.data();

    list.innerHTML += `
      <div class="card">
        <h3>${r.type}</h3>
        <p>${r.description}</p>
        <p>${r.location}</p>

        <a href="https://wa.me/${r.whatsapp}">
          <button class="primary">Chat</button>
        </a>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
