<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roomie – Roommates</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">Room<span>ie</span></div>
    <button id="post-toggle-btn" onclick="togglePostForm()" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer">
      + Post
    </button>
  </div>

  <!-- POST FORM (hidden by default) -->
  <div id="post-form" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:20px">
    <h3 style="font-family:'Syne',sans-serif;margin-bottom:16px">Post Roommate Listing</h3>

    <div class="form-group">
      <label>I am…</label>
      <select id="rm-type">
        <option value="need">Looking for a room (Need a place)</option>
        <option value="have">Have a room (Looking for roommate)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Location / Area *</label>
      <input type="text" id="rm-location" placeholder="e.g. Near University of Lagos" />
    </div>
    <div class="form-group">
      <label>Description *</label>
      <textarea id="rm-desc" rows="3" placeholder="Tell others about yourself, your schedule, preferences…"></textarea>
    </div>
    <div class="form-group">
      <label>WhatsApp number *</label>
      <input type="tel" id="rm-whatsapp" placeholder="+1 555 000 0000" />
    </div>
    <p id="rm-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none"></p>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="rm-submit-btn" onclick="handlePostRoommate()">Post Listing</button>
      <button class="btn btn-secondary" onclick="togglePostForm()" style="width:auto;padding:14px 20px">Cancel</button>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin:0">
    <button id="tab-all"  class="tab-btn active" onclick="setTab('all')"  style="flex:1;padding:14px;background:none;border:none;color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid var(--accent);cursor:pointer">All</button>
    <button id="tab-need" class="tab-btn" onclick="setTab('need')" style="flex:1;padding:14px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid transparent;cursor:pointer">Need Room</button>
    <button id="tab-have" class="tab-btn" onclick="setTab('have')" style="flex:1;padding:14px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:14px;border-bottom:2px solid transparent;cursor:pointer">Have Room</button>
  </div>

  <!-- LOADING -->
  <div id="rm-skeleton" style="padding:20px">
    <div class="skeleton" style="height:130px;border-radius:var(--radius);margin-bottom:12px"></div>
    <div class="skeleton" style="height:130px;border-radius:var(--radius);margin-bottom:12px"></div>
    <div class="skeleton" style="height:130px;border-radius:var(--radius)"></div>
  </div>

  <!-- LISTINGS -->
  <div id="rm-container" style="padding:16px 20px;display:none;flex-direction:column;gap:12px;padding-bottom:120px"></div>

  <!-- EMPTY -->
  <div id="rm-empty" class="empty-state" style="display:none">
    <div class="empty-icon">👥</div>
    <div class="empty-title">No listings yet</div>
    <p class="empty-sub">Be the first to post a roommate listing!</p>
  </div>

  <!-- BOTTOM NAVBAR -->
  <nav class="navbar">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="roommate.html" class="nav-item active">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Roommates
    </a>
    <a href="list-room.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Post
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireAuth, postRoommate, getRoommates } from './firebase.js';

    const user = await requireAuth();
    let allListings = [];
    let currentTab = 'all';

    // Load listings
    async function loadRoommates() {
      try {
        allListings = await getRoommates();
        document.getElementById('rm-skeleton').style.display = 'none';
        document.getElementById('rm-container').style.display = 'flex';
        renderListings(allListings);
      } catch (err) {
        showToast('Failed to load listings', 'error');
      }
    }

    function renderListings(list) {
      const container = document.getElementById('rm-container');
      const empty     = document.getElementById('rm-empty');

      if (list.length === 0) {
        container.style.display = 'none';
        empty.style.display = 'flex';
        return;
      }
      container.style.display = 'flex';
      empty.style.display = 'none';

      container.innerHTML = list.map(item => {
        const isNeed    = item.type === 'need';
        const waClean   = item.whatsapp ? item.whatsapp.replace(/\D/g, '') : '';
        const waMsg     = encodeURIComponent(`Hi! I saw your roommate listing on Roomie and I'm interested.`);
        const waHref    = waClean ? `https://wa.me/${waClean}?text=${waMsg}` : `mailto:${item.email || ''}`;
        const initial   = (item.ownerName || item.email || 'U')[0].toUpperCase();

        return `
          <div class="card">
            <div class="card-body">
              <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px">
                <div class="avatar" style="width:40px;height:40px;font-size:.9rem">${initial}</div>
                <div style="flex:1">
                  <div style="display:flex;align-items:center;justify-content:space-between">
                    <span class="card-tag ${isNeed ? 'need' : ''}">${isNeed ? '🔍 Need Room' : '🏠 Have Room'}</span>
                  </div>
                  <div style="font-size:13px;color:var(--muted);margin-top:4px">📍 ${escHtml(item.location || 'Location not specified')}</div>
                </div>
              </div>
              <p style="font-size:14px;color:var(--muted);margin-bottom:14px;line-height:1.6">${escHtml(item.description || '')}</p>
              <button class="btn btn-whatsapp btn-sm" onclick="window.open('${waHref}','_blank')">
                💬 Chat on WhatsApp
              </button>
            </div>
          </div>`;
      }).join('');
    }

    window.setTab = function(tab) {
      currentTab = tab;
      ['all','need','have'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        btn.style.color      = t === tab ? 'var(--text)' : 'var(--muted)';
        btn.style.borderBottom = t === tab ? '2px solid var(--accent)' : '2px solid transparent';
      });
      const filtered = tab === 'all' ? allListings : allListings.filter(l => l.type === tab);
      renderListings(filtered);
    };

    window.togglePostForm = function() {
      const form = document.getElementById('post-form');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    };

    window.handlePostRoommate = async () => {
      const type      = document.getElementById('rm-type').value;
      const location  = document.getElementById('rm-location').value.trim();
      const desc      = document.getElementById('rm-desc').value.trim();
      const whatsapp  = document.getElementById('rm-whatsapp').value.trim();
      const errEl     = document.getElementById('rm-error');
      const btn       = document.getElementById('rm-submit-btn');

      errEl.style.display = 'none';

      if (!location || !desc || !whatsapp) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.style.display = 'block'; return;
      }

      btn.textContent = 'Posting…';
      btn.disabled = true;

      try {
        await postRoommate({
          type, location, description: desc, whatsapp,
          uid: user.uid, email: user.email
        });
        showToast('Listing posted! 🎉', 'success');
        togglePostForm();
        // Reload
        allListings = await getRoommates();
        renderListings(currentTab === 'all' ? allListings : allListings.filter(l => l.type === currentTab));
      } catch (err) {
        errEl.textContent = 'Failed to post listing.';
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Post Listing';
        btn.disabled = false;
      }
    };

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadRoommates();
  </script>
</body>
</html>
